                    <button onclick="toggleAudio()" id="audioToggleBtn" style="background: var(--bg); width: 48px; height: 48px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; color: var(--text);" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                        <i class="fas fa-microphone"></i>
                    </button>
                    ${callData.callType === 'video' ? `
                        <button onclick="toggleVideo()" id="videoToggleBtn" style="background: var(--bg); width: 48px; height: 48px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; color: var(--text);" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                            <i class="fas fa-video"></i>
                        </button>
                    ` : ''}
                    <button onclick="toggleSpeaker()" id="speakerToggleBtn" style="background: var(--bg); width: 48px; height: 48px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; color: var(--text);" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <button onclick="endCall()" style="background: #e74c3c; width: 48px; height: 48px; border-radius: 50%; border: none; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; color: white;" onmouseover="this.style.transform='scale(1.1)';this.style.background='#c0392b'" onmouseout="this.style.transform='scale(1)';this.style.background='#e74c3c'">
                        <i class="fas fa-phone-slash"></i>
                    </button>
                </div>
            `;
            
            document.body.appendChild(container);
            
            // Set local video
            if (localStream) {
                const localVideo = document.getElementById('localVideo');
                if (localVideo) {
                    localVideo.srcObject = localStream;
                }
            }
        }

        /* ============================================
           TOGGLE FUNCTIONS
        ============================================ */
        window.toggleAudio = function() {
            if (localStream) {
                const track = localStream.getAudioTracks()[0];
                if (track) {
                    isAudioEnabled = !isAudioEnabled;
                    track.enabled = isAudioEnabled;
                    
                    const btn = document.getElementById('audioToggleBtn');
                    if (btn) {
                        btn.innerHTML = isAudioEnabled ? '<i class="fas fa-microphone"></i>' : '<i class="fas fa-microphone-slash"></i>';
                        btn.style.background = isAudioEnabled ? 'var(--bg)' : '#e74c3c';
                        btn.style.color = isAudioEnabled ? 'var(--text)' : 'white';
                    }
                }
            }
        };

        window.toggleVideo = function() {
            if (localStream) {
                const track = localStream.getVideoTracks()[0];
                if (track) {
                    isVideoEnabled = !isVideoEnabled;
                    track.enabled = isVideoEnabled;
                    
                    const btn = document.getElementById('videoToggleBtn');
                    if (btn) {
                        btn.innerHTML = isVideoEnabled ? '<i class="fas fa-video"></i>' : '<i class="fas fa-video-slash"></i>';
                        btn.style.background = isVideoEnabled ? 'var(--bg)' : '#e74c3c';
                        btn.style.color = isVideoEnabled ? 'var(--text)' : 'white';
                    }
                }
            }
        };

        window.toggleSpeaker = function() {
            isSpeakerEnabled = !isSpeakerEnabled;
            const remoteVideo = document.getElementById('remoteVideo');
            if (remoteVideo) {
                remoteVideo.volume = isSpeakerEnabled ? 1.0 : 0.0;
            }
            
            const btn = document.getElementById('speakerToggleBtn');
            if (btn) {
                btn.innerHTML = isSpeakerEnabled ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-mute"></i>';
                btn.style.background = isSpeakerEnabled ? 'var(--bg)' : '#e74c3c';
                btn.style.color = isSpeakerEnabled ? 'var(--text)' : 'white';
            }
        };

        /* ============================================
           START VIDEO CALL
        ============================================ */
        window.startVideoCall = async function(memberName, memberKey) {
            if (!currentGroup) {
                alert("Please select a group first");
                return;
            }
            
            if (isCallActive) {
                alert("You're already in a call");
                return;
            }
            
            try {
                localStream = await getMediaStream(true, true);
                if (!localStream) return;
                
                const callId = 'call_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
                
                const callData = {
                    from: myName,
                    fromKey: typeof USER_KEY !== 'undefined' ? USER_KEY : myName,
                    to: memberName,
                    toKey: memberKey,
                    groupId: currentGroup,
                    groupName: document.getElementById('currentGroupName')?.textContent || 'Study Group',
                    timestamp: Date.now(),
                    status: 'ringing',
                    callId: callId,
                    callType: 'video'
                };
                
                currentCall = callData;
                showCallUI(callData, 'outgoing');
                
                peerConnection = createPeerConnection(callId, memberKey);
                
                const offer = await peerConnection.createOffer({
                    offerToReceiveAudio: true,
                    offerToReceiveVideo: true
                });
                await peerConnection.setLocalDescription(offer);
                
                await new Promise(resolve => {
                    if (peerConnection.iceGatheringState === 'complete') {
                        resolve();
                    } else {
                        peerConnection.onicegatheringstatechange = () => {
                            if (peerConnection.iceGatheringState === 'complete') {
                                resolve();
                            }
                        };
                    }
                });
                
                callData.offer = {
                    type: peerConnection.localDescription.type,
                    sdp: peerConnection.localDescription.sdp
                };
                
                await database.ref('calls/' + memberKey + '/' + callId).set(callData);
                listenForAnswer(callId, memberKey);
                
            } catch (err) {
                console.error('Call failed:', err);
                alert('Failed to start call');
                endCall();
            }
        };

        /* ============================================
           START AUDIO CALL
        ============================================ */
        window.startAudioCall = async function(memberName, memberKey) {
            if (!currentGroup) {
                alert("Please select a group first");
                return;
            }
            
            if (isCallActive) {
                alert("You're already in a call");
                return;
            }
            
            try {
                localStream = await getMediaStream(false, true);
                if (!localStream) return;
                
                const callId = 'call_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
                
                const callData = {
                    from: myName,
                    fromKey: typeof USER_KEY !== 'undefined' ? USER_KEY : myName,
                    to: memberName,
                    toKey: memberKey,
                    groupId: currentGroup,
                    groupName: document.getElementById('currentGroupName')?.textContent || 'Study Group',
                    timestamp: Date.now(),
                    status: 'ringing',
                    callId: callId,
                    callType: 'audio'
                };
                
                currentCall = callData;
                showCallUI(callData, 'outgoing');
                
                peerConnection = createPeerConnection(callId, memberKey);
                
                const offer = await peerConnection.createOffer({
                    offerToReceiveAudio: true,
                    offerToReceiveVideo: false
                });
                await peerConnection.setLocalDescription(offer);
                
                await new Promise(resolve => {
                    if (peerConnection.iceGatheringState === 'complete') {
                        resolve();
                    } else {
                        peerConnection.onicegatheringstatechange = () => {
                            if (peerConnection.iceGatheringState === 'complete') {
                                resolve();
                            }
                        };
                    }
                });
                
                callData.offer = {
                    type: peerConnection.localDescription.type,
                    sdp: peerConnection.localDescription.sdp
                };
                
                await database.ref('calls/' + memberKey + '/' + callId).set(callData);
                listenForAnswer(callId, memberKey);
                
            } catch (err) {
                console.error('Call failed:', err);
                alert('Failed to start call');
                endCall();
            }
        };

        /* ============================================
           ANSWER CALL
        ============================================ */
        window.answerCall = async function(callId, callDataStr) {
            try {
                closeCallDialog();
                
                let callData = typeof callDataStr === 'string' ? JSON.parse(callDataStr) : callDataStr;
                
                localStream = await getMediaStream(callData.callType === 'video', true);
                if (!localStream) return;
                
                currentCall = callData;
                currentCall.status = 'connecting';
                showCallUI(callData, 'connecting');
                
                peerConnection = createPeerConnection(callId, callData.fromKey);
                
                const offer = new RTCSessionDescription(callData.offer);
                await peerConnection.setRemoteDescription(offer);
                
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                await new Promise(resolve => {
                    if (peerConnection.iceGatheringState === 'complete') {
                        resolve();
                    } else {
                        peerConnection.onicegatheringstatechange = () => {
                            if (peerConnection.iceGatheringState === 'complete') {
                                resolve();
                            }
                        };
                    }
                });
                
                const myKey = typeof USER_KEY !== 'undefined' ? USER_KEY : myName;
                
                const updates = {};
                updates['calls/' + callData.fromKey + '/' + callId + '/answer'] = {
                    type: peerConnection.localDescription.type,
                    sdp: peerConnection.localDescription.sdp
                };
                updates['calls/' + callData.fromKey + '/' + callId + '/status'] = 'connected';
                updates['calls/' + myKey + '/' + callId + '/status'] = 'connected';
                
                await database.ref().update(updates);
                
                currentCall.status = 'connected';
                isCallActive = true;
                
                const timer = document.getElementById('callTimer');
                if (timer) {
                    startCallTimer();
                }
                
                listenForICECandidates(callId, callData.fromKey);
                
            } catch (err) {
                console.error('Answer failed:', err);
                alert('Failed to answer call');
                endCall();
            }
        };

        /* ============================================
           LISTEN FOR ANSWER
        ============================================ */
        function listenForAnswer(callId, peerKey) {
            const myKey = typeof USER_KEY !== 'undefined' ? USER_KEY : myName;
            
            database.ref('calls/' + myKey + '/' + callId).on('value', async (snapshot) => {
                const callData = snapshot.val();
                if (!callData) return;
                
                if (callData.answer && peerConnection && !peerConnection.currentRemoteDescription) {
                    const answer = new RTCSessionDescription(callData.answer);
                    await peerConnection.setRemoteDescription(answer);
                    
                    if (currentCall) {
                        currentCall.status = 'connected';
                        isCallActive = true;
                        startCallTimer();
                    }
                    
                    listenForICECandidates(callId, peerKey);
                }
                
                if (callData.status === 'ended' || callData.status === 'missed') {
                    endCall();
                }
            });
        }

        /* ============================================
           LISTEN FOR ICE CANDIDATES
        ============================================ */
        function listenForICECandidates(callId, peerKey) {
            database.ref('calls/' + peerKey + '/ice_' + callId).on('child_added', (snapshot) => {
                const data = snapshot.val();
                if (data && data.candidate && peerConnection && data.from !== myName) {
                    peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate))
                        .catch(err => console.log('ICE error:', err.message));
                }
            });
        }

        /* ============================================
           CALL TIMER
        ============================================ */
        function startCallTimer() {
            callStartTime = Date.now();
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                const timer = document.getElementById('callTimer');
                if (timer) {
                    timer.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        /* ============================================
           END CALL
        ============================================ */
        window.endCall = function() {
            if (timerInterval) clearInterval(timerInterval);
            
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            
            if (currentCall) {
                const updates = {};
                updates['calls/' + currentCall.fromKey + '/' + currentCall.callId + '/status'] = 'ended';
                updates['calls/' + currentCall.toKey + '/' + currentCall.callId + '/status'] = 'ended';
                database.ref().update(updates).catch(() => {});
            }
            
            const ui = document.getElementById('callUIContainer');
            if (ui) ui.remove();
            
            closeCallDialog();
            currentCall = null;
            isCallActive = false;
        };

        /* ============================================
           INCOMING CALL DIALOG
        ============================================ */
        function showIncomingCallDialog(callData) {
            if (document.getElementById('callDialog') || isCallActive) return;
            
            const dialog = document.createElement('div');
            dialog.id = 'callDialog';
            dialog.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: var(--card);
                padding: 32px;
                border-radius: 28px;
                box-shadow: 0 30px 60px rgba(0,0,0,0.3);
                z-index: 10001;
                text-align: center;
                min-width: 360px;
                border: 2px solid #4caf50;
                animation: slideUp 0.3s ease;
            `;
            
            dialog.innerHTML = `
                <div style="font-size: 72px; margin-bottom: 24px; animation: ring 1s infinite;">
                    ${callData.callType === 'video' ? '📹' : '🎧'}
                </div>
                <h2 style="margin: 0 0 8px 0; font-size: 28px; font-weight: 600;">Incoming Call</h2>
                <p style="font-size: 24px; font-weight: 500; margin: 16px 0; color: var(--accent);">${callData.from}</p>
                <p style="opacity: 0.7; margin-bottom: 32px; font-size: 16px;">
                    <i class="fas fa-shield-alt"></i> End-to-end encrypted
                </p>
                <div style="display: flex; gap: 20px; justify-content: center;">
                    <button onclick='answerCall("${callData.callId}", ${JSON.stringify(callData).replace(/'/g, "\\'")})' 
                        style="background: #4caf50; padding: 16px 32px; border: none; border-radius: 50px; color: white; cursor: pointer; font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: all 0.3s ease; box-shadow: 0 4px 12px rgba(76,175,80,0.3);"
                        onmouseover="this.style.transform='scale(1.05)';this.style.boxShadow='0 8px 20px rgba(76,175,80,0.4)'"
                        onmouseout="this.style.transform='scale(1)';this.style.boxShadow='0 4px 12px rgba(76,175,80,0.3)'">
                        <i class="fas fa-phone"></i> Answer
                    </button>
                    <button onclick="rejectCall('${callData.callId}', '${callData.fromKey}')" 
                        style="background: #e74c3c; padding: 16px 32px; border: none; border-radius: 50px; color: white; cursor: pointer; font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: all 0.3s ease; box-shadow: 0 4px 12px rgba(231,76,60,0.3);"
                        onmouseover="this.style.transform='scale(1.05)';this.style.boxShadow='0 8px 20px rgba(231,76,60,0.4)'"
                        onmouseout="this.style.transform='scale(1)';this.style.boxShadow='0 4px 12px rgba(231,76,60,0.3)'">
                        <i class="fas fa-phone-slash"></i> Decline
                    </button>
                </div>
            `;
            
            document.body.appendChild(dialog);
        }

        window.rejectCall = function(callId, callerKey) {
            const myKey = typeof USER_KEY !== 'undefined' ? USER_KEY : myName;
            
            database.ref('calls/' + myKey + '/' + callId + '/status').set('missed');
            database.ref('calls/' + callerKey + '/' + callId + '/status').set('missed')
                .then(() => closeCallDialog());
        };

        function closeCallDialog() {
            const dialog = document.getElementById('callDialog');
            if (dialog) dialog.remove();
        }

        /* ============================================
           LISTEN FOR INCOMING CALLS
        ============================================ */
        function listenForIncomingCalls() {
            const myKey = typeof USER_KEY !== 'undefined' ? USER_KEY : myName;
            
            database.ref('calls/' + myKey).on('value', (snapshot) => {
                const calls = snapshot.val();
                if (!calls || isCallActive) return;
                
                Object.entries(calls).forEach(([callId, callData]) => {
                    if (callData.status === 'ringing' && 
                        callData.to === myName && 
                        callData.from !== myName &&
                        !document.getElementById('callDialog')) {
                        
                        if (Date.now() - callData.timestamp < 30000) {
                            showIncomingCallDialog(callData);
                        }
                    }
                });
            });
        }

        /* ============================================
           UPDATE MEMBER LIST
        ============================================ */
        function updateMemberList() {
            if (!currentGroup) return;
            
            database.ref('groups/' + currentGroup + '/members').once('value', (snapshot) => {
                const members = snapshot.val() || {};
                const membersDiv = document.getElementById('membersList');
                if (!membersDiv) return;
                
                membersDiv.innerHTML = '';
                
                Object.entries(members).forEach(([key, member]) => {
                    const div = document.createElement('div');
                    div.style.cssText = `

                    div.innerHTML = `

                            <span style="font-weight: 500;">${member.name} ${member.name === myName ? '(You)' : ''}</span>
                        </div>
                        ${member.name !== myName && !isCallActive ? `
                            <div style="display: flex; gap: 8px;">
                                <button onclick="startVideoCall('${member.name}', '${key}')" 
                                    style="background: var(--accent); color: white; border: none; border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.3s ease;"
                                    onmouseover="this.style.transform='scale(1.05)'" 
                                    onmouseout="this.style.transform='scale(1)'">
                                    <i class="fas fa-video"></i> Video
                                </button>
                                <button onclick="startAudioCall('${member.name}', '${key}')" 
                                    style="background: #4caf50; color: white; border: none; border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.3s ease;"
                                    onmouseover="this.style.transform='scale(1.05)'" 
                                    onmouseout="this.style.transform='scale(1)'">
                                    <i class="fas fa-phone"></i> Audio
                                </button>
                            </div>
                        ` : ''}
                    `;
                    
                    membersDiv.appendChild(div);
                });
            });
        }

        /* ============================================
           ADD CSS STYLES
        ============================================ */
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translate(-50%, 20px);
                }
                to {
                    opacity: 1;
                    transform: translate(-50%, -50%);
                }
            }
            
            @keyframes ring {
                0% { transform: rotate(0deg); }
                10% { transform: rotate(5deg); }
                20% { transform: rotate(-5deg); }
                30% { transform: rotate(3deg); }
                40% { transform: rotate(-3deg); }
                50% { transform: rotate(1deg); }
                60% { transform: rotate(0deg); }
                100% { transform: rotate(0deg); }
            }
            
            @keyframes pulse {
                0% { transform: scale(1); }
                50% { transform: scale(1.1); }
                100% { transform: scale(1); }
            }
            
            #callUIContainer {
                animation: slideUp 0.3s ease;
            }
            
            #callDialog {
                animation: slideUp 0.3s ease;
            }
            
            .play-overlay {
                animation: fadeIn 0.3s ease;
            }
            
            @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }
            
            @media (max-width: 768px) {
                #callUIContainer {
                    width: 100% !important;
                    bottom: 0;
                    right: 0;
                    border-radius: 20px 20px 0 0;
                }
                
                #callDialog {
                    width: 90%;
                    min-width: auto;
                    padding: 24px;
                }
            }
        `;
        document.head.appendChild(style);

        /* ============================================
           INITIALIZE
        ============================================ */
        const sidebar = document.querySelector('.sidebar');
        if (sidebar) {
            let memberListDiv = document.getElementById('memberList');
            if (!memberListDiv) {
                memberListDiv = document.createElement('div');
                memberListDiv.id = 'memberList';
                memberListDiv.style.marginTop = '20px';
                memberListDiv.innerHTML = '<h4 style="margin-bottom: 15px; display: flex; align-items: center; gap: 8px;"><i class="fas fa-users" style="color: var(--accent);"></i> Group Members</h4><div id="membersList"></div>';
                sidebar.appendChild(memberListDiv);
            }
        }
        
        if (typeof selectGroup === 'function') {
            const originalSelect = selectGroup;
            window.selectGroup = function(code) {
                originalSelect(code);
                setTimeout(updateMemberList, 500);
            };
        }
        
        listenForIncomingCalls();
        console.log('✅ Call system ready');
        
        // Export all functions
        window.startVideoCall = startVideoCall;
        window.startAudioCall = startAudioCall;
        window.answerCall = answerCall;
        window.rejectCall = rejectCall;
        window.endCall = endCall;
        window.toggleAudio = toggleAudio;
        window.toggleVideo = toggleVideo;
        window.toggleSpeaker = toggleSpeaker;
    }
})();

<script>
(function() {
    // Wait for main app to be ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initGroupEditing);
    } else {
        setTimeout(initGroupEditing, 1500);
    }

    function initGroupEditing() {
        if (typeof myName === 'undefined' || typeof database === 'undefined' || typeof currentGroup === 'undefined') {
            console.log('Waiting for main app...');
            setTimeout(initGroupEditing, 500);
            return;
        }

        /* ============================================
           EDIT GROUP NAME
        ============================================ */
        window.editGroupName = function() {
            if (!currentGroup) {
                alert("Please select a group first");
                return;
            }

            // Get current group data
            database.ref('groups/' + currentGroup).once('value')
                .then((snapshot) => {
                    const groupData = snapshot.val();
                    if (!groupData) {
                        alert("Group not found");
                        return;
                    }

                    // Check if user is creator or has permission
                    const isCreator = groupData.creatorKey === (typeof USER_KEY !== 'undefined' ? USER_KEY : myName);
                    
                    if (!isCreator && groupData.creator !== myName) {
                        alert("❌ Only the group creator can change the group name");
                        return;
                    }

                    // Prompt for new name
                    const newName = prompt("Enter new group name:", groupData.name);
                    if (!newName || newName.trim() === "") return;
                    
                    if (newName.trim() === groupData.name) {
                        alert("Name is the same, no changes made");
                        return;
                    }

                    // Show loading state
                    const editBtn = document.getElementById('editGroupNameBtn');
                    if (editBtn) {
                        editBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                        editBtn.disabled = true;
                    }

                    // Update in Firebase
                    database.ref('groups/' + currentGroup + '/name').set(newName.trim())
                        .then(() => {
                            alert("✅ Group name updated successfully!");
                            
                            // Update UI
                            const groupNameEl = document.getElementById('currentGroupName');
                            if (groupNameEl) {
                                groupNameEl.textContent = newName.trim();
                            }
                            
                            // Refresh groups list
                            if (typeof renderGroupsList === 'function') {
                                renderGroupsList();
                            }
                        })
                        .catch((error) => {
                            console.error("Error updating group name:", error);
                            alert("❌ Failed to update group name");
                        })
                        .finally(() => {
                            if (editBtn) {
                                editBtn.innerHTML = '<i class="fas fa-edit"></i> Edit Name';
                                editBtn.disabled = false;
                            }
                        });

<script>
(function() {
    // Wait for main app to be ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initNotifications);
    } else {
        setTimeout(initNotifications, 1500);
    }

    function initNotifications() {
        if (typeof myName === 'undefined' || typeof database === 'undefined') {
            console.log('Waiting for main app...');
            setTimeout(initNotifications, 500);
            return;
        }

        // Notification settings
        let notificationPermission = false;
        let lastNotificationTime = {};
        const NOTIFICATION_COOLDOWN = 5000; // 5 seconds between same type notifications
        
        // Store last message counts per group
        let lastMessageCounts = {};

        /* ============================================
           REQUEST NOTIFICATION PERMISSION
        ============================================ */
        async function requestNotificationPermission() {
            if (!('Notification' in window)) {
                console.log('This browser does not support notifications');
                return false;
            }

            if (Notification.permission === 'granted') {
                notificationPermission = true;
                return true;
            }

            if (Notification.permission !== 'denied') {
                const permission = await Notification.requestPermission();
                notificationPermission = permission === 'granted';
                return notificationPermission;
            }

            return false;
        }

        /* ============================================
           SHOW NOTIFICATION
        ============================================ */
        function showNotification(title, options = {}) {
            if (!notificationPermission) return;

            // Check cooldown
            const notificationKey = options.tag || 'general';
            const now = Date.now();
            
            if (lastNotificationTime[notificationKey] && 
                now - lastNotificationTime[notificationKey] < NOTIFICATION_COOLDOWN) {
                return;
            }

            try {
                // Default options
                const defaultOptions = {
                    icon: 'https://study-groups-app-19c8a.firebaseapp.com/favicon.ico',
                    badge: 'https://study-groups-app-19c8a.firebaseapp.com/favicon.ico',
                    silent: false,
                    vibrate: [200, 100, 200],
                    requireInteraction: false
                };

                const notification = new Notification(title, { ...defaultOptions, ...options });
                
                // Auto close after 5 seconds if not requiring interaction
                if (!options.requireInteraction) {
                    setTimeout(() => notification.close(), 5000);
                }

                // Handle click
                notification.onclick = function() {
                    window.focus();
                    this.close();
                };

                lastNotificationTime[notificationKey] = now;
                
            } catch (error) {
                console.log('Notification error:', error);
            }
        }

        /* ============================================
           SETUP NOTIFICATION BUTTON
        ============================================ */
        function setupNotificationButton() {
            const headerControls = document.querySelector('.header-controls');
            if (!headerControls) return;

            // Check if button already exists
            if (document.getElementById('notificationToggle')) return;

            const notifBtn = document.createElement('button');
            notifBtn.id = 'notificationToggle';
            notifBtn.style.background = notificationPermission ? '#4caf50' : '#666';
            notifBtn.style.marginRight = '8px';
            notifBtn.innerHTML = notificationPermission ? 
                '<i class="fas fa-bell"></i> Notifications On' : 
                '<i class="fas fa-bell-slash"></i> Enable Notifications';
            
            notifBtn.onclick = async function() {
                if (notificationPermission) {
                    // Toggle off (but can't actually disable permission, so we just show message)
                    alert('To disable notifications, change site permissions in your browser settings');
                } else {
                    const granted = await requestNotificationPermission();
                    if (granted) {
                        this.innerHTML = '<i class="fas fa-bell"></i> Notifications On';
                        this.style.background = '#4caf50';
                        showNotification('✅ Notifications Enabled', {
                            body: 'You will now receive notifications for messages and calls',
                            tag: 'welcome'
                        });
                    }
                }
            };

            headerControls.insertBefore(notifBtn, headerControls.firstChild);
        }

        /* ============================================
           CHECK NEW MESSAGES
        ============================================ */
        function monitorMessages() {
            if (!currentGroup) return;

            const messagesRef = database.ref('messages/' + currentGroup);
            
            messagesRef.on('value', (snapshot) => {
                const messages = snapshot.val() || {};
                const messageCount = Object.keys(messages).length;
                
                // Get last message
                const lastMessage = Object.values(messages)
                    .sort((a, b) => b.timestamp - a.timestamp)[0];
                
                if (!lastMessage) return;

                // Check if this is a new message (within last 10 seconds)
                const isNew = Date.now() - lastMessage.timestamp < 10000;
                
                // Check if sender is not current user
                const isFromOthers = lastMessage.sender !== myName;

                if (isNew && isFromOthers) {
                    // Get group name
                    database.ref('groups/' + currentGroup + '/name').once('value')
                        .then(groupSnapshot => {
                            const groupName = groupSnapshot.val() || 'Study Group';
                            
                            showNotification(`💬 New message in ${groupName}`, {
                                body: `${lastMessage.sender}: ${lastMessage.text.substring(0, 100)}${lastMessage.text.length > 100 ? '...' : ''}`,
                                tag: `message_${lastMessage.timestamp}`,
                                data: { groupId: currentGroup, message: lastMessage }
                            });
                        });
                }
            });
        }

        /* ============================================
           MONITOR ALL GROUPS FOR NEW MESSAGES
        ============================================ */
        function monitorAllGroups() {
            if (!myGroups || myGroups.length === 0) return;

            myGroups.forEach(groupCode => {
                // Don't monitor current group separately (already monitored)
                if (groupCode === currentGroup) return;

                const messagesRef = database.ref('messages/' + groupCode);
                
                messagesRef.limitToLast(1).on('child_added', (snapshot) => {
                    const message = snapshot.val();
                    
                    // Check if message is from last 30 seconds and not from current user
                    if (message && 
                        Date.now() - message.timestamp < 30000 && 
                        message.sender !== myName) {
                        
                        // Get group name
                        database.ref('groups/' + groupCode + '/name').once('value')
                            .then(groupSnapshot => {
                                const groupName = groupSnapshot.val() || 'Study Group';
                                
                                showNotification(`💬 New message in ${groupName}`, {
                                    body: `${message.sender}: ${message.text.substring(0, 100)}${message.text.length > 100 ? '...' : ''}`,
                                    tag: `group_${groupCode}_${message.timestamp}`,
                                    data: { groupId: groupCode, message: message }
                                });
                            });
                    }
                });
            });
        }

        /* ============================================
           MONITOR INCOMING CALLS
        ============================================ */
        function monitorCalls() {
            const myKey = typeof USER_KEY !== 'undefined' ? USER_KEY : myName;
            
            database.ref('calls/' + myKey).on('child_added', (snapshot) => {
                const callData = snapshot.val();
                
                // Check if it's an incoming call (not from self) and within last 10 seconds
                if (callData && 
                    callData.from !== myName && 
                    callData.status === 'ringing' &&
                    Date.now() - callData.timestamp < 10000) {
                    
                    const callType = callData.callType === 'video' ? '📹 Video Call' : '🎧 Audio Call';
                    
                    showNotification(`📞 Incoming ${callType}`, {
                        body: `${callData.from} is calling you in ${callData.groupName || 'Study Group'}`,
                        tag: `call_${callData.callId}`,
                        requireInteraction: true, // Don't auto-dismiss for calls
                        vibrate: [500, 200, 500, 200, 500] // Longer vibration pattern for calls
                    });
                }
            });
        }

        /* ============================================
           MONITOR MEMBER JOINED
        ============================================ */
        function monitorGroupMembers() {
            myGroups.forEach(groupCode => {
                const groupRef = database.ref('groups/' + groupCode + '/members');
                
                groupRef.on('child_added', (snapshot) => {
                    const member = snapshot.val();
                    
                    // Check if it's a new member (joined in last 10 seconds) and not current user
                    if (member && 
                        member.name !== myName &&
                        Date.now() - member.joinedAt < 10000) {
                        
                        database.ref('groups/' + groupCode + '/name').once('value')
                            .then(groupSnapshot => {
                                const groupName = groupSnapshot.val() || 'Study Group';
                                
                                showNotification(`👋 New Member in ${groupName}`, {
                                    body: `${member.name} joined the group`,
                                    tag: `join_${groupCode}_${member.joinedAt}`
                                });
                            });
                    }
                });
            });
        }

        /* ============================================
           OVERRIDE SELECT GROUP TO SETUP MONITORING
        ============================================ */
        if (typeof selectGroup === 'function') {
            const originalSelect = selectGroup;
            window.selectGroup = function(code) {
                originalSelect(code);
                setTimeout(() => {
                    monitorMessages();
                }, 500);
            };
        }

        /* ============================================
           ADD CSS FOR NOTIFICATION BUTTON
        ============================================ */
        const style = document.createElement('style');
        style.textContent = `
            #notificationToggle {
                background: #666;
                transition: all 0.3s ease;
                display: inline-flex;
                align-items: center;
                gap: 6px;
            }
            
            #notificationToggle i {
                font-size: 14px;
            }
            
            #notificationToggle:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            }
            
            #notificationToggle:active {
                transform: translateY(0);
            }
            
            @media (max-width: 768px) {
                .header-controls {
                    display: flex;
                    flex-wrap: wrap;
                    gap: 8px;
                }
                
                #notificationToggle {
                    font-size: 13px;
                    padding: 8px 12px;
                }
            }
            
            @media (max-width: 480px) {
                #notificationToggle {
                    font-size: 0;
                    padding: 8px 10px;
                }
                
                #notificationToggle i {
                    font-size: 16px;
                    margin: 0;
                }
            }
        `;
        document.head.appendChild(style);

        /* ============================================
           REQUEST PERMISSION ON PAGE LOAD
        ============================================ */
        async function initialize() {
            // Check if we already have permission
            if (Notification.permission === 'granted') {
                notificationPermission = true;
            } else if (Notification.permission !== 'denied') {
                // Auto-request permission after 2 seconds (don't be too aggressive)
                setTimeout(async () => {
                    const granted = await requestNotificationPermission();
                    if (granted) {
                        showNotification('✨ Notifications Ready', {
                            body: 'You will now receive notifications for messages and calls',
                            tag: 'welcome'
                        });
                    }
                }, 2000);
            }

            setupNotificationButton();
            
            // Set up monitors when groups are available
            const checkGroups = setInterval(() => {
                if (myGroups && myGroups.length > 0) {
                    monitorAllGroups();
                    monitorGroupMembers();
                    clearInterval(checkGroups);
                }
            }, 1000);
            
            monitorCalls();
            
            console.log('✅ Notification system ready, permission:', notificationPermission);
        }

        initialize();
    }
})();
</script>

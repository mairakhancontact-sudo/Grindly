<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Grindly Social Feed</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" href="/favicon.ico">
    <link rel="manifest" href="/site.webmanifest">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #e0e0e0;
            line-height: 1.6;
            min-height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a2e;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #4f46e5;
            border-radius: 4px;
        }

        /* Container */
        .feed-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 16px 80px 16px;
        }

        /* Header */
        .feed-header {
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-radius: 0 0 20px 20px;
            margin-bottom: 20px;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 800px;
            margin: 0 auto;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 2rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4f46e5, #7c3aed, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #e0e0e0;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: #4f46e5;
            transform: translateX(-3px);
        }

        /* Create Post Card */
        .create-post-card {
            background: #16213e;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .post-input-area {
            display: flex;
            gap: 16px;
        }

        .user-avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(79, 70, 229, 0.3);
        }

        .post-input-wrapper {
            flex: 1;
        }

        .post-input-wrapper textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            font-size: 1rem;
            resize: none;
            font-family: inherit;
            color: #e0e0e0;
        }

        .post-input-wrapper textarea:focus {
            outline: none;
            border-color: #4f46e5;
            background: rgba(255, 255, 255, 0.08);
        }

        .post-input-wrapper textarea::placeholder {
            color: #8888aa;
        }

        .post-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .char-counter {
            font-size: 0.75rem;
            color: #8888aa;
        }

        .char-counter.warning {
            color: #f59e0b;
        }

        .char-counter.danger {
            color: #ef4444;
        }

        .post-btn {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .post-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(79, 70, 229, 0.4);
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: #16213e;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .stat-item {
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 4px 12px;
            border-radius: 12px;
        }

        .stat-item:hover {
            background: rgba(79, 70, 229, 0.1);
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 800;
            color: #4f46e5;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #8888aa;
            text-transform: uppercase;
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .filter-tab {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #8888aa;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .filter-tab:hover {
            border-color: #4f46e5;
            color: #4f46e5;
        }

        .filter-tab.active {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-color: transparent;
            color: white;
        }

        /* Post Card */
        .post-card {
            background: #16213e;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .post-card:hover {
            border-color: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .post-header {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .post-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }

        .post-info {
            flex: 1;
        }

        .post-name {
            font-weight: 700;
            font-size: 1rem;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .post-badge {
            background: rgba(79, 70, 229, 0.2);
            color: #4f46e5;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .post-handle {
            font-size: 0.75rem;
            color: #8888aa;
        }

        .post-time {
            font-size: 0.7rem;
            color: #8888aa;
            margin-top: 4px;
        }

        .post-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #e0e0e0;
            margin-bottom: 16px;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding-left: 60px;
        }

        .hashtag {
            color: #4f46e5;
            cursor: pointer;
        }

        .mention {
            color: #a78bfa;
            cursor: pointer;
        }

        /* Post Stats & Actions */
        .post-stats {
            display: flex;
            gap: 24px;
            padding: 12px 0;
            margin: 12px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .post-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #8888aa;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .post-stat:hover {
            color: #4f46e5;
        }

        .post-actions-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }

        .post-action {
            display: flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #8888aa;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .post-action:hover {
            border-color: #4f46e5;
            color: #4f46e5;
        }

        .post-action.liked {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
            color: #ef4444;
        }

        .post-action.delete {
            color: #ef4444;
        }

        .post-action.delete:hover {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        /* Comments Section - ALWAYS VISIBLE with input */
        .comments-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 16px;
            margin-top: 16px;
        }

        .comment-item {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        .comment-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .comment-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }

        .comment-content {
            flex: 1;
        }

        .comment-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }

        .comment-name {
            font-weight: 600;
            font-size: 0.85rem;
            color: #e0e0e0;
        }

        .comment-time {
            font-size: 0.65rem;
            color: #8888aa;
        }

        .comment-text {
            font-size: 0.85rem;
            color: #e0e0e0;
            line-height: 1.5;
        }

        .comment-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .comment-action {
            background: none;
            border: none;
            color: #8888aa;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .comment-action:hover {
            background: rgba(79, 70, 229, 0.1);
            color: #4f46e5;
        }

        /* COMMENT INPUT - ALWAYS VISIBLE */
        .comment-input-wrapper {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .comment-input-area {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .comment-input-area input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            font-size: 0.85rem;
            color: #e0e0e0;
        }

        .comment-input-area input:focus {
            outline: none;
            border-color: #4f46e5;
        }

        .comment-input-area input::placeholder {
            color: #8888aa;
        }

        .reply-btn {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reply-btn:hover {
            transform: scale(0.98);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 24px;
            background: #16213e;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-subtitle {
            color: #8888aa;
        }

        /* Loading */
        .loading-state {
            text-align: center;
            padding: 40px;
            color: #8888aa;
        }

        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast */
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #16213e;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 12px 24px;
            color: #e0e0e0;
            font-size: 0.85rem;
            z-index: 1000;
            animation: toastUp 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        @keyframes toastUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Trending Section */
        .trending-section {
            background: #16213e;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .trending-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .trending-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .trending-item:hover {
            color: #4f46e5;
        }

        .trending-topic {
            font-weight: 500;
        }

        .trending-count {
            font-size: 0.75rem;
            color: #8888aa;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .feed-container { padding: 12px; }
            .post-text { padding-left: 0; margin-top: 8px; }
            .post-header { flex-direction: column; align-items: flex-start; }
            .post-avatar { width: 40px; height: 40px; font-size: 0.9rem; }
            .user-avatar { width: 44px; height: 44px; font-size: 1rem; }
            .post-action { padding: 6px 12px; font-size: 0.75rem; }
            .post-stats { gap: 16px; }
            .comment-input-area { flex-wrap: wrap; }
            .reply-btn { width: 100%; }
        }
    </style>
</head>
<body>

<div class="feed-container">
    <!-- Header -->
    <div class="feed-header">
        <div class="header-content">
            <div class="logo-area">
                <div class="logo-icon">🎓</div>
                <div class="logo-text">Grindly Feed</div>
            </div>
            <button class="back-btn" onclick="goBack()">
                ← Back to Dashboard
            </button>
        </div>
    </div>

    <!-- Create Post -->
    <div class="create-post-card">
        <div class="post-input-area">
            <div class="user-avatar" id="currentAvatar">👤</div>
            <div class="post-input-wrapper">
                <textarea id="postInput" rows="2" placeholder="What's on your mind? Share what you're learning, ask a question, or help someone out! 🎓"></textarea>
                <div class="post-actions">
                    <div class="char-counter" id="charCount">0/500</div>
                    <button class="post-btn" onclick="createPost()">📢 Post</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
        <div class="stat-item" onclick="filterPosts('all')">
            <div class="stat-number" id="totalPosts">0</div>
            <div class="stat-label">Posts</div>
        </div>
        <div class="stat-item" onclick="filterPosts('all')">
            <div class="stat-number" id="totalComments">0</div>
            <div class="stat-label">Comments</div>
        </div>
        <div class="stat-item" onclick="filterPosts('liked')">
            <div class="stat-number" id="totalLikes">0</div>
            <div class="stat-label">Likes</div>
        </div>
        <div class="stat-item" onclick="filterPosts('my')">
            <div class="stat-number" id="myPosts">0</div>
            <div class="stat-label">My Posts</div>
        </div>
    </div>

    <!-- Trending Topics -->
    <div class="trending-section" id="trendingSection">
        <div class="trending-title">
            🔥 Trending Topics
        </div>
        <div id="trendingList">
            <div class="loading-state"><span class="loading-spinner"></span> Loading trends...</div>
        </div>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterPosts('all')">📱 All Posts</button>
        <button class="filter-tab" onclick="filterPosts('trending')">🔥 Trending</button>
        <button class="filter-tab" onclick="filterPosts('my')">👤 My Posts</button>
        <button class="filter-tab" onclick="filterPosts('liked')">❤️ Liked</button>
    </div>

    <!-- Feed -->
    <div id="feedList">
        <div class="loading-state"><span class="loading-spinner"></span> Loading feed...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBAIPxgXPZmGdPvB98TLFRfTAClgXWEIM0",
        authDomain: "student-teacher-app-4e7c9.firebaseapp.com",
        databaseURL: "https://student-teacher-app-4e7c9-default-rtdb.firebaseio.com",
        projectId: "student-teacher-app-4e7c9",
        storageBucket: "student-teacher-app-4e7c9.firebasestorage.app",
        messagingSenderId: "737621420458",
        appId: "1:737621420458:web:74c873869a1a47c2ce23d3"
    };

    let database = null;
    
    try {
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        database = firebase.database();
        console.log("✅ Firebase connected");
    } catch(e) {
        console.error("Firebase error:", e);
    }

    let allPosts = [];
    let currentFilter = 'all';

    function getCurrentUser() {
        let userId = localStorage.getItem('studentUserId');
        let userName = localStorage.getItem('studentName');
        
        if (!userId) {
            userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('studentUserId', userId);
        }
        if (!userName) {
            const names = ['Learner', 'Scholar', 'Grinder', 'Achiever', 'Student'];
            userName = names[Math.floor(Math.random() * names.length)] + '_' + Math.floor(Math.random() * 1000);
            localStorage.setItem('studentName', userName);
        }
        
        return { id: userId, name: userName };
    }

    async function loadPosts() {
        const container = document.getElementById('feedList');
        if (!container) return;
        
        container.innerHTML = '<div class="loading-state"><span class="loading-spinner"></span> Loading feed...</div>';
        
        try {
            if (!database) throw new Error("Firebase not connected");
            
            const snapshot = await database.ref('socialFeed/posts').once('value');
            allPosts = [];
            
            if (snapshot.exists()) {
                snapshot.forEach(child => {
                    allPosts.push({ id: child.key, ...child.val() });
                });
            }
            
            allPosts.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            filterAndRender();
            updateStats();
            updateTrending();
            
        } catch(e) {
            console.error(e);
            container.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Connection Error</div><div class="empty-subtitle">Please refresh</div></div>`;
        }
    }

    function filterAndRender() {
        const user = getCurrentUser();
        let filteredPosts = [...allPosts];
        
        if (currentFilter === 'my') {
            filteredPosts = filteredPosts.filter(p => p.authorId === user.id);
        } else if (currentFilter === 'liked') {
            filteredPosts = filteredPosts.filter(p => p.likes && p.likes[user.id]);
        } else if (currentFilter === 'trending') {
            filteredPosts = filteredPosts.sort((a, b) => {
                const aEngagement = (a.likes ? Object.keys(a.likes).length : 0) + (a.comments ? Object.keys(a.comments).length : 0);
                const bEngagement = (b.likes ? Object.keys(b.likes).length : 0) + (b.comments ? Object.keys(b.comments).length : 0);
                return bEngagement - aEngagement;
            });
        }
        
        renderPosts(filteredPosts);
    }

    function renderPosts(posts) {
        const container = document.getElementById('feedList');
        if (!container) return;
        
        const user = getCurrentUser();
        
        if (posts.length === 0) {
            container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">No posts yet</div><div class="empty-subtitle">Be the first to post something!</div></div>`;
            return;
        }
        
        container.innerHTML = posts.map(post => {
            const isLiked = post.likes && post.likes[user.id];
            const likeCount = post.likes ? Object.keys(post.likes).length : 0;
            const commentCount = post.comments ? Object.keys(post.comments).length : 0;
            const timeAgo = getTimeAgo(post.createdAt);
            const isMyPost = post.authorId === user.id;
            
            return `
                <div class="post-card" data-post-id="${post.id}">
                    <div class="post-header">
                        <div class="post-avatar">${getAvatarIcon(post.authorName)}</div>
                        <div class="post-info">
                            <div class="post-name">
                                ${escapeHtml(post.authorName)}
                                ${isMyPost ? '<span class="post-badge">You</span>' : ''}
                            </div>
                            <div class="post-handle">@${escapeHtml(post.authorName).toLowerCase().replace(/\s/g, '')}</div>
                            <div class="post-time">${timeAgo}</div>
                        </div>
                    </div>
                    <div class="post-text">${formatPostText(escapeHtml(post.text))}</div>
                    <div class="post-stats">
                        <div class="post-stat" onclick="toggleLike('${post.id}')">
                            ❤️ ${likeCount} ${likeCount === 1 ? 'Like' : 'Likes'}
                        </div>
                        <div class="post-stat" onclick="scrollToComments('${post.id}')">
                            💬 ${commentCount} ${commentCount === 1 ? 'Comment' : 'Comments'}
                        </div>
                        <div class="post-stat" onclick="sharePost('${post.id}')">
                            🔗 Share
                        </div>
                    </div>
                    <div class="post-actions-bar">
                        <button class="post-action ${isLiked ? 'liked' : ''}" onclick="toggleLike('${post.id}')">
                            ❤️ ${isLiked ? 'Liked' : 'Like'}
                        </button>
                        <button class="post-action" onclick="scrollToComments('${post.id}')">
                            💬 Comment
                        </button>
                        <button class="post-action" onclick="sharePost('${post.id}')">
                            📤 Share
                        </button>
                        ${isMyPost ? `<button class="post-action delete" onclick="deletePost('${post.id}')">🗑️ Delete</button>` : ''}
                    </div>
                    
                    <!-- COMMENTS SECTION - ALWAYS VISIBLE WITH INPUT -->
                    <div class="comments-section" id="comments-${post.id}">
                        <div id="commentsList-${post.id}">
                            ${renderCommentsList(post, user)}
                        </div>
                        <!-- COMMENT INPUT - ALWAYS HERE -->
                        <div class="comment-input-wrapper">
                            <div class="comment-input-area">
                                <input type="text" id="commentInput-${post.id}" placeholder="Write a comment..." onkeypress="if(event.key==='Enter') addComment('${post.id}')">
                                <button class="reply-btn" onclick="addComment('${post.id}')">Post Comment</button>
                            </div>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    function renderCommentsList(post, user) {
        if (!post.comments || Object.keys(post.comments).length === 0) {
            return '<div style="text-align:center;padding:16px;color:#8888aa;">No comments yet. Be the first to comment! 💬</div>';
        }
        
        const commentsArray = Object.entries(post.comments).map(([id, c]) => ({ id, ...c })).sort((a,b) => a.createdAt - b.createdAt);
        
        return commentsArray.map(comment => {
            const isLiked = comment.likes && comment.likes[user.id];
            const likeCount = comment.likes ? Object.keys(comment.likes).length : 0;
            
            return `
                <div class="comment-item">
                    <div class="comment-avatar">${getAvatarIcon(comment.authorName)}</div>
                    <div class="comment-content">
                        <div class="comment-header">
                            <span class="comment-name">${escapeHtml(comment.authorName)}</span>
                            <span class="comment-time">${getTimeAgo(comment.createdAt)}</span>
                        </div>
                        <div class="comment-text">${escapeHtml(comment.text)}</div>
                        <div class="comment-actions">
                            <button class="comment-action" onclick="likeComment('${post.id}', '${comment.id}')">
                                ❤️ ${likeCount}
                            </button>
                            <button class="comment-action" onclick="replyToComment('${post.id}', '${comment.authorName}')">
                                💬 Reply
                            </button>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    function formatPostText(text) {
        text = text.replace(/#(\w+)/g, '<span class="hashtag" onclick="searchHashtag(\'$1\')">#$1</span>');
        text = text.replace(/@(\w+)/g, '<span class="mention" onclick="viewProfile(\'$1\')">@$1</span>');
        return text;
    }

    window.createPost = async function() {
        const text = document.getElementById('postInput')?.value.trim();
        const user = getCurrentUser();
        
        if (!text) {
            showToast("Please write something first!");
            return;
        }
        
        if (text.length > 500) {
            showToast("Post is too long (max 500 characters)");
            return;
        }
        
        const post = {
            text: text,
            authorId: user.id,
            authorName: user.name,
            createdAt: Date.now(),
            likes: {},
            comments: {}
        };
        
        try {
            const newRef = await database.ref('socialFeed/posts').push(post);
            if (newRef.key) {
                showToast("✅ Posted successfully!");
                document.getElementById('postInput').value = '';
                document.getElementById('charCount').innerHTML = '0/500';
                await loadPosts();
            }
        } catch(e) {
            showToast("Failed to post. Please try again.");
        }
    };

    window.toggleLike = async function(postId) {
        const user = getCurrentUser();
        const post = allPosts.find(p => p.id === postId);
        if (!post) return;
        
        const isLiked = post.likes && post.likes[user.id];
        
        try {
            if (isLiked) {
                await database.ref(`socialFeed/posts/${postId}/likes/${user.id}`).remove();
            } else {
                await database.ref(`socialFeed/posts/${postId}/likes/${user.id}`).set(true);
                showToast("❤️ Liked!");
            }
            await loadPosts();
        } catch(e) {}
    };

    window.addComment = async function(postId) {
        const input = document.getElementById(`commentInput-${postId}`);
        const text = input?.value.trim();
        if (!text) return;
        
        const user = getCurrentUser();
        const comment = {
            text: text,
            authorId: user.id,
            authorName: user.name,
            createdAt: Date.now(),
            likes: {}
        };
        
        try {
            await database.ref(`socialFeed/posts/${postId}/comments`).push(comment);
            input.value = '';
            await loadPosts();
            showToast("💬 Comment posted!");
        } catch(e) {
            showToast("Failed to post comment");
        }
    };

    window.likeComment = async function(postId, commentId) {
        const user = getCurrentUser();
        try {
            const commentRef = database.ref(`socialFeed/posts/${postId}/comments/${commentId}/likes/${user.id}`);
            const snapshot = await commentRef.once('value');
            
            if (snapshot.exists()) {
                await commentRef.remove();
            } else {
                await commentRef.set(true);
                showToast("❤️ Liked comment!");
            }
            await loadPosts();
        } catch(e) {}
    };

    window.replyToComment = function(postId, authorName) {
        const input = document.getElementById(`commentInput-${postId}`);
        if (input) {
            input.value = `@${authorName} `;
            input.focus();
        }
    };

    window.scrollToComments = function(postId) {
        const commentsDiv = document.getElementById(`comments-${postId}`);
        if (commentsDiv) {
            commentsDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
            const input = document.getElementById(`commentInput-${postId}`);
            if (input) input.focus();
        }
    };

    window.sharePost = function(postId) {
        const post = allPosts.find(p => p.id === postId);
        if (post) {
            navigator.clipboard.writeText(`"${post.text.substring(0, 100)}..." - ${post.authorName} on Grindly Feed`);
            showToast("📋 Post copied to clipboard!");
        }
    };

    window.deletePost = async function(postId) {
        if (confirm("Are you sure you want to delete this post?")) {
            try {
                await database.ref(`socialFeed/posts/${postId}`).remove();
                showToast("🗑️ Post deleted");
                await loadPosts();
            } catch(e) {
                showToast("Failed to delete post");
            }
        }
    };

    window.filterPosts = function(filter) {
        currentFilter = filter;
        
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.classList.remove('active');
            if (tab.textContent.toLowerCase().includes(filter) || 
                (filter === 'all' && tab.textContent.includes('All'))) {
                tab.classList.add('active');
            }
        });
        
        filterAndRender();
    };

    window.searchHashtag = function(hashtag) {
        showToast(`Searching for #${hashtag}...`);
        const filtered = allPosts.filter(p => p.text.toLowerCase().includes(`#${hashtag.toLowerCase()}`));
        renderPosts(filtered);
    };

    window.viewProfile = function(username) {
        showToast(`Viewing profile: ${username}`);
    };

    async function updateStats() {
        let totalPosts = allPosts.length;
        let totalComments = 0;
        let totalLikes = 0;
        let myPosts = 0;
        const user = getCurrentUser();
        
        allPosts.forEach(post => {
            if (post.comments) totalComments += Object.keys(post.comments).length;
            if (post.likes) totalLikes += Object.keys(post.likes).length;
            if (post.authorId === user.id) myPosts++;
        });
        
        document.getElementById('totalPosts').textContent = totalPosts;
        document.getElementById('totalComments').textContent = totalComments;
        document.getElementById('totalLikes').textContent = totalLikes;
        document.getElementById('myPosts').textContent = myPosts;
    }

    async function updateTrending() {
        const container = document.getElementById('trendingList');
        if (!container) return;
        
        const hashtags = {};
        allPosts.forEach(post => {
            const hashtagMatches = post.text.match(/#(\w+)/g);
            if (hashtagMatches) {
                hashtagMatches.forEach(tag => {
                    const cleanTag = tag.substring(1).toLowerCase();
                    hashtags[cleanTag] = (hashtags[cleanTag] || 0) + 1;
                });
            }
        });
        
        const sorted = Object.entries(hashtags).sort((a, b) => b[1] - a[1]).slice(0, 5);
        
        if (sorted.length === 0) {
            container.innerHTML = '<div style="text-align:center;color:#8888aa;">No trending topics yet</div>';
            return;
        }
        
        container.innerHTML = sorted.map(([tag, count]) => `
            <div class="trending-item" onclick="searchHashtag('${tag}')">
                <span class="trending-topic">#${tag}</span>
                <span class="trending-count">${count} posts</span>
            </div>
        `).join('');
    }

    function updateAvatar() {
        const user = getCurrentUser();
        const avatarEl = document.getElementById('currentAvatar');
        if (avatarEl) avatarEl.textContent = getAvatarIcon(user.name);
    }

    function getAvatarIcon(name) {
        return name ? name.charAt(0).toUpperCase() : '👤';
    }

    function getTimeAgo(timestamp) {
        if (!timestamp) return 'Just now';
        const seconds = Math.floor((Date.now() - timestamp) / 1000);
        if (seconds < 60) return `${seconds}s`;
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `${minutes}m`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `${hours}h`;
        const days = Math.floor(hours / 24);
        if (days < 7) return `${days}d`;
        return `${Math.floor(days / 7)}w`;
    }

    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function showToast(message) {
        const existing = document.querySelector('.toast-message');
        if (existing) existing.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function setupCharCounter() {
        const input = document.getElementById('postInput');
        const counter = document.getElementById('charCount');
        if (input && counter) {
            input.addEventListener('input', function() {
                const len = this.value.length;
                counter.innerHTML = `${len}/500`;
                counter.classList.remove('warning', 'danger');
                if (len > 450) counter.classList.add('warning');
                if (len > 490) counter.classList.add('danger');
            });
        }
    }

    function goBack() {
        window.location.href = 'studentmode.html';
    }

    function setupRealtimeListener() {
        if (!database) return;
        database.ref('socialFeed/posts').on('value', () => loadPosts());
    }

    function init() {
        updateAvatar();
        setupCharCounter();
        loadPosts();
        setupRealtimeListener();
        console.log("🐦 Grindly Social Feed loaded!");
    }

    init();
</script>
</body>
</html>

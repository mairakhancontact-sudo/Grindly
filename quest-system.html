<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grindly | Quest System - ULTIMATE FIXED</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <style>
        /* ===== QUEST SYSTEM STYLES - COMPLETE FIXED ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0f1f;
            --card: #151e2f;
            --card-hover: #1e2a3a;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: #2a3548;
            --accent: #4f46e5;
            --rpg-gold: #fbbf24;
            --rpg-silver: #94a3b8;
            --rpg-health: #ef4444;
            --rpg-mana: #3b82f6;
            --rpg-xp: #f59e0b;
            --rpg-legendary: #f97316;
            --rpg-epic: #a855f7;
            --rpg-rare: #3b82f6;
            --rpg-uncommon: #22c55e;
            --rpg-common: #64748b;
            
            --streak-fire: #ff6b6b;
            --achievement-gold: #ffd700;
            --premium-purple: #9b59b6;
            --special-cyan: #00d2d3;
            --boss-red: #e74c3c;
            
            --space-xs: clamp(0.25rem, 1vw, 0.5rem);
            --space-sm: clamp(0.5rem, 2vw, 0.75rem);
            --space-md: clamp(0.75rem, 3vw, 1rem);
            --space-lg: clamp(1rem, 4vw, 1.5rem);
            --space-xl: clamp(1.5rem, 5vw, 2rem);
            --space-2xl: clamp(2rem, 6vw, 3rem);
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            padding: var(--space-md);
            position: relative;
            overflow-x: hidden;
        }

        .container {
            max-width: min(1200px, 100% - 2rem);
            margin: 0 auto;
        }

        /* Streak Flame */
        .streak-flame {
            font-size: clamp(1.5rem, 5vw, 2rem);
            filter: drop-shadow(0 0 10px var(--streak-fire));
            animation: flameFlicker 1.5s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes flameFlicker {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px #ff6b6b); }
            25% { transform: scale(1.1); filter: drop-shadow(0 0 15px #ff8c8c); }
            50% { transform: scale(1.2); filter: drop-shadow(0 0 25px #ffa07a); }
            75% { transform: scale(1.1); filter: drop-shadow(0 0 15px #ff8c8c); }
        }

        .streak-counter {
            font-size: clamp(1rem, 4vw, 1.5rem);
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b6b, #ff8c8c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Achievement Popups */
        .achievement-popup {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--card), #0f172a);
            border: 3px solid var(--achievement-gold);
            border-radius: 20px;
            padding: var(--space-lg);
            max-width: min(350px, 90vw);
            z-index: 9999;
            animation: achievementSlide 0.5s ease-out, achievementGlow 2s infinite;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(10px);
            pointer-events: none;
        }

        @keyframes achievementSlide {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes achievementGlow {
            0%, 100% { box-shadow: 0 10px 40px rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 10px 60px rgba(255, 215, 0, 0.6); }
        }

        .achievement-icon {
            font-size: clamp(2rem, 8vw, 3rem);
            margin-right: var(--space-md);
            filter: drop-shadow(0 0 10px gold);
        }

        .achievement-title {
            font-size: clamp(1rem, 4vw, 1.2rem);
            font-weight: 900;
            color: var(--achievement-gold);
            text-transform: uppercase;
        }

        .achievement-name {
            font-size: clamp(1.2rem, 5vw, 1.5rem);
            font-weight: 700;
            color: white;
        }

        /* Boss Battle */
        .boss-section {
            background: linear-gradient(135deg, rgba(231, 76, 60, 0.1), rgba(192, 57, 43, 0.2));
            border: 3px solid var(--boss-red);
            border-radius: 30px;
            padding: var(--space-xl);
            margin: var(--space-2xl) 0;
            position: relative;
            overflow: hidden;
            animation: bossPulse 3s infinite;
        }

        @keyframes bossPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(231, 76, 60, 0.3); }
            50% { box-shadow: 0 0 60px rgba(231, 76, 60, 0.6); }
        }

        .boss-header {
            display: flex;
            align-items: center;
            gap: var(--space-lg);
            flex-wrap: wrap;
        }

        .boss-icon {
            font-size: clamp(3rem, 12vw, 5rem);
            animation: bossFloat 3s ease-in-out infinite;
        }

        @keyframes bossFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        .boss-title {
            font-size: clamp(1.5rem, 6vw, 2rem);
            font-weight: 900;
            color: var(--boss-red);
            text-shadow: 0 0 20px rgba(231, 76, 60, 0.5);
        }

        .boss-health-bar {
            width: 100%;
            height: clamp(20px, 5vh, 30px);
            background: #2c3e50;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid var(--boss-red);
            margin: var(--space-lg) 0;
        }

        .boss-health-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #e74c3c, #c0392b, #e74c3c);
            background-size: 200% 100%;
            animation: bossHealthPulse 2s infinite;
            transition: width 0.5s ease;
        }

        @keyframes bossHealthPulse {
            0% { background-position: 0% 0; }
            50% { background-position: 100% 0; }
            100% { background-position: 0% 0; }
        }

        .boss-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(150px, 100%), 1fr));
            gap: var(--space-md);
            margin-top: var(--space-lg);
        }

        .boss-stat {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: var(--space-md);
            text-align: center;
            border: 2px solid var(--boss-red);
        }

        /* Pet Companion */
        .pet-section {
            background: linear-gradient(135deg, rgba(155, 89, 182, 0.1), rgba(142, 68, 173, 0.2));
            border: 3px solid var(--premium-purple);
            border-radius: 30px;
            padding: var(--space-xl);
            margin: var(--space-2xl) 0;
            position: relative;
        }

        .pet-container {
            display: flex;
            align-items: center;
            gap: var(--space-xl);
            flex-wrap: wrap;
        }

        .pet-avatar {
            font-size: clamp(3rem, 12vw, 5rem);
            filter: drop-shadow(0 0 20px var(--premium-purple));
            animation: petBounce 2s ease-in-out infinite;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .pet-avatar:hover {
            transform: scale(1.1);
        }

        @keyframes petBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .pet-info {
            flex: 1;
            min-width: min(250px, 100%);
        }

        .pet-name {
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            font-weight: 900;
            color: var(--premium-purple);
            margin-bottom: var(--space-sm);
        }

        .pet-level-bar {
            height: clamp(10px, 3vh, 15px);
            background: #2c3e50;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid var(--premium-purple);
        }

        .pet-level-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #9b59b6, #8e44ad, #9b59b6);
            background-size: 200% 100%;
            animation: petLevelPulse 2s infinite;
            transition: width 0.5s ease;
        }

        .pet-messages {
            margin-top: var(--space-md);
            padding: var(--space-md);
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            border-left: 4px solid var(--premium-purple);
            font-style: italic;
            animation: petMessageGlow 2s infinite;
        }

        @keyframes petMessageGlow {
            0%, 100% { border-left-color: var(--premium-purple); }
            50% { border-left-color: #d980fa; }
        }

        /* Special Events */
        .events-section {
            background: linear-gradient(135deg, rgba(0, 210, 211, 0.1), rgba(0, 184, 212, 0.2));
            border: 3px solid var(--special-cyan);
            border-radius: 30px;
            padding: var(--space-xl);
            margin: var(--space-2xl) 0;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(280px, 100%), 1fr));
            gap: var(--space-lg);
            margin-top: var(--space-lg);
        }

        .event-card {
            background: linear-gradient(135deg, rgba(0,0,0,0.5), rgba(0,0,0,0.7));
            border: 2px solid var(--special-cyan);
            border-radius: 20px;
            padding: var(--space-lg);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .event-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 210, 211, 0.3);
        }

        .event-card.active {
            animation: eventPulse 1.5s infinite;
        }

        @keyframes eventPulse {
            0%, 100% { border-color: var(--special-cyan); }
            50% { border-color: #00ffff; }
        }

        .event-timer {
            position: absolute;
            top: var(--space-sm);
            right: var(--space-sm);
            background: rgba(0,0,0,0.8);
            padding: var(--space-xs) var(--space-sm);
            border-radius: 20px;
            border: 2px solid var(--special-cyan);
            font-size: clamp(0.7rem, 3vw, 0.9rem);
            font-weight: 700;
            color: var(--special-cyan);
        }

        .event-icon {
            font-size: clamp(2rem, 8vw, 3rem);
            margin-bottom: var(--space-sm);
        }

        .event-name {
            font-size: clamp(1.1rem, 5vw, 1.3rem);
            font-weight: 900;
            color: var(--special-cyan);
            margin-bottom: var(--space-xs);
            word-wrap: break-word;
        }

        .event-desc {
            font-size: clamp(0.8rem, 3vw, 0.9rem);
            color: var(--text-muted);
            margin-bottom: var(--space-md);
            word-wrap: break-word;
        }

        .event-reward {
            background: linear-gradient(135deg, var(--special-cyan), #00b894);
            color: black;
            padding: var(--space-xs) var(--space-sm);
            border-radius: 20px;
            font-weight: 700;
            font-size: clamp(0.8rem, 3vw, 0.9rem);
            display: inline-block;
        }

        /* Header */
        .quest-header {
            background: linear-gradient(135deg, var(--card), #0f172a);
            border: 3px solid var(--rpg-gold);
            border-radius: 30px;
            padding: var(--space-lg);
            margin-bottom: var(--space-xl);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: var(--space-md);
        }

        .quest-title {
            font-size: clamp(1.5rem, 6vw, 2rem);
            font-weight: 800;
            color: var(--rpg-gold);
            text-shadow: 2px 2px 0 #000;
        }

        .back-btn {
            background: var(--rpg-gold);
            color: black;
            border: none;
            padding: var(--space-sm) var(--space-lg);
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: clamp(0.8rem, 3vw, 1rem);
            white-space: nowrap;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(251,191,36,0.3);
        }

        /* Game Master Panel */
        .game-master-panel {
            position: fixed;
            bottom: clamp(10px, 5vw, 30px);
            right: clamp(10px, 5vw, 30px);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: var(--space-sm);
            z-index: 1000;
            pointer-events: none;
            max-width: min(350px, 90vw);
        }

        .gm-bubble {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 3px solid var(--rpg-gold);
            border-radius: 20px 20px 5px 20px;
            padding: var(--space-md) var(--space-lg);
            color: var(--text);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: bubbleAppear 0.3s ease-out;
            position: relative;
            font-family: 'Courier New', monospace;
            backdrop-filter: blur(10px);
            pointer-events: auto;
            width: 100%;
            font-size: clamp(0.8rem, 3vw, 0.95rem);
            line-height: 1.5;
        }

        .gm-bubble::after {
            content: '';
            position: absolute;
            bottom: -12px;
            right: 20px;
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-right: 3px solid var(--rpg-gold);
            border-bottom: 3px solid var(--rpg-gold);
            transform: rotate(45deg);
            border-radius: 0 0 5px 0;
        }

        .gm-character {
            width: clamp(60px, 15vw, 80px);
            height: clamp(60px, 15vw, 80px);
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 30px 30px 30px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(2rem, 8vw, 3rem);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(251,191,36,0.3);
            border: 3px solid var(--rpg-gold);
            pointer-events: auto;
            animation: gmFloat 3s ease-in-out infinite;
            margin-left: auto;
        }

        /* Hero Section */
        .hero-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(250px, 100%), 1fr));
            gap: var(--space-lg);
            background: rgba(0,0,0,0.4);
            border-radius: 30px;
            padding: var(--space-lg);
            border: 2px solid var(--rpg-gold);
            margin-bottom: var(--space-xl);
        }

        .player-card {
            text-align: center;
            background: linear-gradient(135deg, rgba(251,191,36,0.1), rgba(0,0,0,0.5));
            border-radius: 20px;
            padding: var(--space-lg);
            border: 2px solid var(--rpg-gold);
        }

        .player-avatar {
            font-size: clamp(3rem, 12vw, 5rem);
            background: linear-gradient(135deg, var(--rpg-gold), var(--rpg-legendary));
            width: clamp(80px, 20vw, 120px);
            height: clamp(80px, 20vw, 120px);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--space-md);
            transform: rotate(5deg);
            box-shadow: 0 0 30px rgba(251,191,36,0.3);
        }

        .player-name {
            font-size: clamp(1.2rem, 5vw, 1.5rem);
            font-weight: 800;
            color: var(--rpg-gold);
            margin-bottom: var(--space-xs);
        }

        .player-title {
            font-size: clamp(0.8rem, 3vw, 0.9rem);
            color: var(--rpg-silver);
            background: rgba(0,0,0,0.5);
            padding: var(--space-xs);
            border-radius: 30px;
        }

        /* Resource Bars */
        .resource-bars {
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        .resource-header {
            display: flex;
            justify-content: space-between;
            color: var(--text);
            margin-bottom: var(--space-xs);
            font-size: clamp(0.8rem, 3vw, 0.9rem);
            text-transform: uppercase;
        }

        .resource-track {
            height: clamp(15px, 4vh, 20px);
            background: rgba(0,0,0,0.7);
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid var(--border);
        }

        .resource-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .resource-fill.xp { background: linear-gradient(90deg, var(--rpg-xp), #fbbf24); }
        .resource-fill.health { background: linear-gradient(90deg, var(--rpg-health), #ff8a8a); }
        .resource-fill.mana { background: linear-gradient(90deg, var(--rpg-mana), #6b9eff); }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(200px, 100%), 1fr));
            gap: var(--space-md);
            margin-bottom: var(--space-xl);
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.8));
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: var(--space-md);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            transition: all 0.3s ease;
        }

        .stat-icon { 
            font-size: clamp(1.5rem, 6vw, 2.5rem); 
            min-width: clamp(40px, 10vw, 60px); 
            text-align: center; 
        }
        .stat-value { 
            font-size: clamp(1.2rem, 5vw, 2rem); 
            font-weight: 800; 
            color: var(--text); 
            line-height: 1; 
        }
        .stat-label { 
            font-size: clamp(0.7rem, 2.5vw, 0.8rem); 
            color: var(--rpg-silver); 
            text-transform: uppercase; 
        }
        .stat-bonus { 
            font-size: clamp(0.6rem, 2vw, 0.7rem); 
            color: var(--rpg-gold); 
        }

        /* Quick Actions */
        .quick-actions {
            display: flex;
            gap: var(--space-sm);
            margin: var(--space-xl) 0;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: var(--space-sm) var(--space-lg);
            border: none;
            border-radius: 15px;
            font-weight: 700;
            font-size: clamp(0.8rem, 3vw, 1rem);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            background: linear-gradient(135deg, var(--rpg-gold), #f59e0b);
            color: black;
            flex: 1 1 auto;
            min-width: min(120px, 100%);
            justify-content: center;
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Quest Categories */
        .quest-category {
            margin-bottom: var(--space-2xl);
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            margin-bottom: var(--space-lg);
            padding-bottom: var(--space-sm);
            border-bottom: 3px solid var(--rpg-gold);
            flex-wrap: wrap;
        }

        .category-icon { 
            font-size: clamp(1.5rem, 6vw, 2rem); 
            animation: spin 4s linear infinite; 
        }
        .category-title {
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            font-weight: 800;
            color: var(--rpg-gold);
        }
        .category-badge {
            margin-left: auto;
            background: var(--rpg-gold);
            color: black;
            padding: var(--space-xs) var(--space-md);
            border-radius: 30px;
            font-weight: 700;
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            white-space: nowrap;
        }

        /* Quest Cards */
        .quest-card {
            background: linear-gradient(135deg, rgba(30,40,60,0.9), rgba(20,30,50,0.95));
            border: 2px solid;
            border-radius: 20px;
            padding: var(--space-lg);
            margin-bottom: var(--space-md);
            transition: all 0.3s ease;
            position: relative;
            animation: questAppear 0.5s ease-out;
            width: 100%;
            overflow: visible;
        }

        .quest-card.common { border-color: var(--rpg-common); }
        .quest-card.uncommon { border-color: var(--rpg-uncommon); }
        .quest-card.rare { border-color: var(--rpg-rare); }
        .quest-card.epic { border-color: var(--rpg-epic); }
        .quest-card.legendary { border-color: var(--rpg-legendary); }

        .quest-header {
            display: flex;
            align-items: flex-start;
            gap: var(--space-md);
            margin-bottom: var(--space-sm);
            flex-wrap: wrap;
        }

        .quest-icon {
            width: clamp(40px, 8vw, 60px);
            height: clamp(40px, 8vw, 60px);
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            flex-shrink: 0;
        }

        .quest-info {
            flex: 1;
            min-width: 200px;
        }

        .quest-name {
            font-size: clamp(1.1rem, 4vw, 1.3rem);
            font-weight: 700;
            color: var(--text);
            margin-bottom: var(--space-xs);
            line-height: 1.3;
            word-wrap: break-word;
        }

        .quest-meta {
            display: flex;
            gap: var(--space-sm);
            align-items: center;
            flex-wrap: wrap;
        }

        .quest-rarity {
            padding: var(--space-xs) var(--space-sm);
            border-radius: 30px;
            font-size: clamp(0.6rem, 2vw, 0.7rem);
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .quest-rarity.common { background: var(--rpg-common); color: white; }
        .quest-rarity.uncommon { background: var(--rpg-uncommon); color: white; }
        .quest-rarity.rare { background: var(--rpg-rare); color: white; }
        .quest-rarity.epic { background: var(--rpg-epic); color: white; }
        .quest-rarity.legendary { background: var(--rpg-legendary); color: white; }

        .quest-xp { 
            color: var(--rpg-xp); 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            gap: var(--space-xs); 
            font-size: clamp(0.8rem, 3vw, 0.9rem);
            white-space: nowrap;
        }

        .quest-description { 
            color: var(--rpg-silver); 
            margin-bottom: var(--space-sm); 
            font-size: clamp(0.8rem, 3vw, 0.9rem);
            line-height: 1.5;
            word-wrap: break-word;
        }

        .quest-rewards {
            display: flex;
            gap: var(--space-sm);
            margin: var(--space-sm) 0;
            flex-wrap: wrap;
        }

        .reward-chip {
            background: rgba(0,0,0,0.5);
            border: 2px solid var(--rpg-gold);
            border-radius: 30px;
            padding: var(--space-xs) var(--space-sm);
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            color: var(--rpg-gold);
            white-space: nowrap;
        }

        .quest-progress {
            margin: var(--space-sm) 0;
        }

        .progress-track {
            height: 8px;
            background: rgba(0,0,0,0.5);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: var(--space-xs);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--rpg-gold), var(--rpg-legendary));
            width: 0%;
            transition: width 0.5s ease;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            color: var(--text-muted);
        }

        .quest-actions {
            display: flex;
            gap: var(--space-sm);
            margin-top: var(--space-md);
        }

        .quest-btn {
            flex: 1;
            padding: var(--space-sm);
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: clamp(0.8rem, 3vw, 1rem);
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 0;
            word-wrap: break-word;
        }

        .quest-btn.claim {
            background: linear-gradient(135deg, var(--rpg-gold), #f59e0b);
            color: black;
        }

        .quest-btn:disabled {
            background: var(--rpg-common);
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* New Quest Badge */
        .new-quest-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: black;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 900;
            border: 2px solid #000;
            animation: badgePulse 1s infinite;
            z-index: 10;
            white-space: nowrap;
        }

        @keyframes badgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            top: clamp(10px, 5vw, 20px);
            right: clamp(10px, 5vw, 20px);
            background: linear-gradient(135deg, var(--card), #0f172a);
            border: 2px solid var(--rpg-gold);
            border-radius: 15px;
            padding: var(--space-sm) var(--space-md);
            color: white;
            z-index: 9999;
            animation: slideIn 0.3s ease;
            max-width: min(350px, 90vw);
            font-size: clamp(0.8rem, 3vw, 0.95rem);
            word-wrap: break-word;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--rpg-gold);
            font-size: 1.2rem;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            margin: 20px 0;
            animation: loadingPulse 1.5s infinite;
        }

        .loading::after {
            content: '...';
            animation: loadingDots 1.5s infinite;
        }

        @keyframes loadingDots {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
        }

        @keyframes loadingPulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Mobile Optimizations */
        @media (max-width: 768px) {
            .hero-section { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .game-master-panel { bottom: 10px; right: 10px; max-width: 250px; }
            .category-badge { margin-left: 0; width: 100%; text-align: center; }
            .boss-header { justify-content: center; text-align: center; }
            .pet-container { justify-content: center; text-align: center; }
            .quick-actions { flex-direction: column; }
            .action-btn { width: 100%; }
            .quest-header { flex-wrap: wrap; }
            .quest-meta { width: 100%; }
            .quest-info { min-width: 100%; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .quest-header { flex-direction: column; align-items: flex-start; }
            .quest-meta { width: 100%; justify-content: flex-start; }
            .event-timer { position: static; margin-bottom: var(--space-sm); display: inline-block; }
            .quest-name { font-size: 1rem; }
        }

        @media (min-width: 1024px) {
            .quest-card { padding: 1.5rem; }
            .quest-name { font-size: 1.3rem; }
            .quest-description { font-size: 0.95rem; }
            .reward-chip { font-size: 0.9rem; }
            .quest-rarity { font-size: 0.7rem; }
        }

        @media (orientation: landscape) and (max-height: 600px) {
            .game-master-panel { bottom: 5px; right: 5px; }
            .gm-character { width: 50px; height: 50px; font-size: 2rem; }
            .hero-section { padding: var(--space-sm); }
        }

        button, .quest-btn, .action-btn, .back-btn, .gm-character, .pet-avatar, .event-card {
            min-height: 44px;
            min-width: 44px;
        }

        select, input, textarea, button {
            font-size: 16px;
        }

        html {
            scroll-behavior: smooth;
        }

        .container {
            -webkit-overflow-scrolling: touch;
        }

        .quest-name, .quest-description, .event-name, .event-desc, .pet-name, .boss-title {
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>

    <script>
        // ===== QUEST SYSTEM - COMPLETE FIXED VERSION =====
        (function() {
            console.log("🎮 Quest System loaded with all fixes");

            // Game Master Messages
            const GM_MESSAGES = {

                boss: "👾 The BOSS is watching! Complete quests to defeat it!",
                event: "🎉 Special event active! Double rewards!"
            };

            // Constants
            const RPG_STORAGE_KEY = 'studentRpgData';
            const PET_KEY = 'studentPetData';
            const BOSS_KEY = 'studentBossData';
            const EVENTS_KEY = 'studentEventsData';

            // Game Titles
            const GAME_TITLES = [
                { level: 1, title: 'Novice Adventurer', icon: '🌱' },
                { level: 3, title: 'Apprentice Scholar', icon: '📚' },
                { level: 5, title: 'Skilled Warrior', icon: '⚔️' },
                { level: 7, title: 'Wise Sage', icon: '🔮' },

                { level: 20, title: 'Dragon Slayer', icon: '🐉' },
                { level: 25, title: 'Arcane Master', icon: '✨' },
                { level: 30, title: 'Immortal Champion', icon: '🏆' }
            ];

            // Quest Templates - INCREASED XP VALUES
            const QUEST_TEMPLATES = {
                daily: [
                    { id: 'daily_focus', name: '🧘 Focus Warrior', description: 'Complete a focused study session', icon: '🎯', xp: 150, requirement: 1, rarity: 'common', stats: { wisdom: 1 } },
                    { id: 'daily_tasks', name: '⚔️ Task Slayer', description: 'Complete 3 tasks', icon: '✓', xp: 180, requirement: 3, rarity: 'uncommon', stats: { strength: 1 } },
                    { id: 'daily_streak', name: '🔥 Streak Keeper', description: 'Maintain your study streak', icon: '🔥', xp: 225, requirement: 1, rarity: 'rare', stats: { luck: 1 } },
                    { id: 'daily_hours', name: '⌛ Time Mage', description: 'Study for 2 hours', icon: '⌛', xp: 300, requirement: 2, rarity: 'epic', stats: { intelligence: 1 } },
                    { id: 'daily_early', name: '🌅 Early Bird', description: 'Study before 8 AM', icon: '🌅', xp: 240, requirement: 1, rarity: 'rare', stats: { wisdom: 1, luck: 1 } },
                    { id: 'daily_night', name: '🦉 Night Owl', description: 'Study after 10 PM', icon: '🌙', xp: 240, requirement: 1, rarity: 'rare', stats: { intelligence: 1, luck: 1 } },
                    { id: 'daily_perfect', name: '💯 Perfect Day', description: 'Complete all daily quests', icon: '💯', xp: 450, requirement: 1, rarity: 'epic', stats: { all: 2 } }
                ],
                weekly: [
                    { id: 'weekly_streak', name: '🏆 Streak Legend', description: 'Maintain a 7-day streak', icon: '🔥', xp: 1500, requirement: 7, rarity: 'epic', stats: { luck: 3, wisdom: 2 } },
                    { id: 'weekly_tasks', name: '⚔️ Quest Master', description: 'Complete 20 tasks', icon: '📜', xp: 1200, requirement: 20, rarity: 'epic', stats: { strength: 3, intelligence: 2 } },
                    { id: 'weekly_hours', name: '⏰ Time Lord', description: 'Study 12 hours', icon: '⌛', xp: 1800, requirement: 12, rarity: 'legendary', stats: { intelligence: 3, wisdom: 2 } },
                    { id: 'weekly_focus', name: '🎯 Focus Champion', description: 'Complete 10 focus sessions', icon: '🎯', xp: 1350, requirement: 10, rarity: 'epic', stats: { wisdom: 3, luck: 2 } },
                    { id: 'weekly_perfect', name: '🌟 Perfect Week', description: 'Study every day for a week', icon: '🌟', xp: 2400, requirement: 7, rarity: 'legendary', stats: { all: 4 } }
                ],
                legendary: [
                    { id: 'legend_first', name: '🌟 First Steps', description: 'Complete your first quest', icon: '🌱', xp: 300, requirement: 1, rarity: 'common', stats: { luck: 2 } },
                    { id: 'legend_10', name: '⚔️ Quest Apprentice', description: 'Complete 10 quests', icon: '⚔️', xp: 750, requirement: 10, rarity: 'uncommon', stats: { strength: 2, intelligence: 2 } },
                    { id: 'legend_50', name: '👑 Quest Warrior', description: 'Complete 50 quests', icon: '👑', xp: 1800, requirement: 50, rarity: 'rare', stats: { wisdom: 3, luck: 3 } },
                    { id: 'legend_100', name: '✨ Quest Legend', description: 'Complete 100 quests', icon: '✨', xp: 3600, requirement: 100, rarity: 'epic', stats: { all: 4 } },
                    { id: 'legend_streak_30', name: '🌋 Inferno Master', description: 'Achieve a 30-day streak', icon: '🔥', xp: 6000, requirement: 30, rarity: 'legendary', stats: { all: 5 } },
                    { id: 'legend_tasks_500', name: '💪 Task Overlord', description: 'Complete 500 tasks', icon: '💪', xp: 4500, requirement: 500, rarity: 'legendary', stats: { all: 4 } },
                    { id: 'legend_hours_100', name: '⌛ Time Wizard', description: 'Study 100 hours', icon: '⏳', xp: 5400, requirement: 100, rarity: 'legendary', stats: { all: 5 } }
                ]
            };

            // ===== STREAK FLAME =====
            function getStreakFlame(streak) {
                if (streak >= 30) return '🔥🔥🔥 INFERNO';
                if (streak >= 14) return '🔥🔥 BLAZE';
                if (streak >= 7) return '🔥 FLAME';
                if (streak >= 3) return '🔥 SPARK';
                return '🔥 EMBER';
            }

            // ===== ACHIEVEMENT POPUPS =====
            let achievementQueue = [];
            let showingAchievement = false;

            function showAchievement(title, name, icon) {
                achievementQueue.push({ title, name, icon });
                if (!showingAchievement) {
                    processAchievementQueue();
                }
            }

            function processAchievementQueue() {
                if (achievementQueue.length === 0) {
                    showingAchievement = false;
                    return;
                }

                showingAchievement = true;
                const ach = achievementQueue.shift();
                
                const popup = document.createElement('div');
                popup.className = 'achievement-popup';
                popup.innerHTML = `
                    <div style="display: flex; align-items: center;">
                        <div class="achievement-icon">${ach.icon}</div>
                        <div>
                            <div class="achievement-title">${ach.title}</div>
                            <div class="achievement-name">${ach.name}</div>
                        </div>
                    </div>
                `;
                
                document.body.appendChild(popup);
                
                setTimeout(() => {
                    popup.remove();
                    setTimeout(processAchievementQueue, 500);
                }, 3000);
            }

            // ===== PET COMPANION =====
            function loadPetData() {
                try {
                    const saved = localStorage.getItem(PET_KEY);
                    if (saved) {
                        return JSON.parse(saved);
                    }
                } catch (e) {}
                
                return {
                    level: 1,
                    xp: 0,
                    xpToNextLevel: 100,
                    name: 'Buddy',
                    type: '🐶',
                    messages: [
                        "Let's study together!",
                        "You're doing great!",
                        "Keep going!",
                        "I believe in you!",
                        "One more task!",
                        "You've got this!",
                        "I'm so proud of you!",
                        "Learning is fun!"
                    ],
                    lastMessage: 0
                };
            }

            function savePetData(data) {
                localStorage.setItem(PET_KEY, JSON.stringify(data));
            }

            function updatePet(questsCompleted) {
                const pet = loadPetData();
                const oldLevel = pet.level;
                
                pet.xp += questsCompleted * 10;
                
                while (pet.xp >= pet.xpToNextLevel) {
                    pet.xp -= pet.xpToNextLevel;
                    pet.level++;
                    pet.xpToNextLevel = Math.floor(pet.xpToNextLevel * 1.5);
                    
                    if (pet.level >= 20) pet.type = '🐉';
                    else if (pet.level >= 15) pet.type = '🦄';
                    else if (pet.level >= 10) pet.type = '🦊';
                    else if (pet.level >= 5) pet.type = '🐱';
                    else pet.type = '🐶';
                    
                    showAchievement('PET LEVEL UP!', `${pet.name} reached level ${pet.level}!`, pet.type);
                }
                
                savePetData(pet);
                return pet;
            }

            function getPetMessage(pet) {
                const now = Date.now();
                if (now - pet.lastMessage > 30000) {
                    pet.lastMessage = now;
                    const randomIndex = Math.floor(Math.random() * pet.messages.length);
                    return pet.messages[randomIndex];
                }
                return null;
            }

            // ===== BOSS BATTLE =====
            function loadBossData() {
                try {
                    const saved = localStorage.getItem(BOSS_KEY);
                    if (saved) {
                        return JSON.parse(saved);
                    }
                } catch (e) {}
                
                return {
                    health: 1000,
                    maxHealth: 1000,
                    level: 1,
                    defeated: false,
                    rewards: [500, 1000, 2000, 5000],
                    currentReward: 0
                };
            }

            function saveBossData(data) {
                localStorage.setItem(BOSS_KEY, JSON.stringify(data));
            }

            function updateBoss(questsCompleted) {
                const boss = loadBossData();
                if (boss.defeated) return boss;
                
                const damage = questsCompleted * 50;
                boss.health = Math.max(0, boss.health - damage);
                
                if (boss.health <= 0) {
                    boss.defeated = true;
                    const reward = boss.rewards[boss.currentReward];
                    addXP(reward);
                    showAchievement('BOSS DEFEATED!', `You earned ${reward} XP!`, '👑');
                    
                    if (boss.currentReward < boss.rewards.length - 1) {
                        boss.currentReward++;
                        boss.level++;
                        boss.health = boss.maxHealth + (boss.level * 500);
                        boss.maxHealth = boss.health;
                        boss.defeated = false;
                        showNotification(`👾 BOSS LEVEL ${boss.level} HAS APPEARED!`, 'warning');
                    }
                }
                
                saveBossData(boss);
                return boss;
            }

            // ===== SPECIAL EVENTS =====
            function loadEvents() {
                try {
                    const saved = localStorage.getItem(EVENTS_KEY);
                    if (saved) {
                        return JSON.parse(saved);
                    }
                } catch (e) {}
                
                const now = Date.now();
                return {
                    active: [],
                    upcoming: [
                        {
                            id: 'event_double_xp',
                            name: 'Double XP Weekend',
                            description: 'Earn twice the XP from all quests!',
                            icon: '✨',
                            reward: '2x XP',
                            startTime: now + 86400000,
                            duration: 172800000,
                            active: false
                        },
                        {
                            id: 'event_boss_rush',
                            name: 'Boss Rush',
                            description: 'Bosses take double damage!',
                            icon: '👾',
                            reward: '2x Boss Damage',
                            startTime: now + 43200000,
                            duration: 86400000,
                            active: false
                        },
                        {
                            id: 'event_pet_boost',
                            name: 'Pet Growth Spurt',
                            description: 'Your pet gains triple XP!',
                            icon: '🐾',
                            reward: '3x Pet XP',
                            startTime: now + 129600000,
                            duration: 86400000,
                            active: false
                        }
                    ],
                    history: []
                };
            }

            function saveEvents(events) {
                localStorage.setItem(EVENTS_KEY, JSON.stringify(events));
            }

            function checkEvents() {
                const events = loadEvents();
                const now = Date.now();
                let eventChanged = false;
                
                events.upcoming = events.upcoming.filter(event => {
                    if (event.startTime <= now) {
                        event.active = true;
                        event.startTime = now;
                        event.endTime = now + event.duration;
                        events.active.push(event);
                        showNotification(`🎉 EVENT STARTED: ${event.name}!`, 'success');
                        eventChanged = true;
                        return false;
                    }
                    return true;
                });
                
                events.active = events.active.filter(event => {
                    if (event.endTime <= now) {
                        events.history.push({ ...event, completedAt: now });
                        showNotification(`⏰ Event ended: ${event.name}`, 'info');
                        eventChanged = true;
                        return false;
                    }
                    return true;
                });
                
                if (eventChanged) {
                    saveEvents(events);
                }
                
                return events;
            }

            function getEventMultiplier(type) {
                const events = checkEvents();
                let multiplier = 1;
                
                events.active.forEach(event => {
                    if (type === 'xp' && event.id === 'event_double_xp') multiplier *= 2;
                    if (type === 'boss' && event.id === 'event_boss_rush') multiplier *= 2;
                    if (type === 'pet' && event.id === 'event_pet_boost') multiplier *= 3;
                });
                
                return multiplier;
            }

            // ===== DATA LOADING =====
            function loadStudyData() {
                try {
                    const data = localStorage.getItem('studentPersistentData');
                    if (data) {
                        return JSON.parse(data);
                    }
                } catch (e) {
                    console.warn("Failed to load study data:", e);
                }
                return { studyData: { streak: 0, totalStudyHours: 0, studySessions: [], dailyStats: [] }, tasks: [] };
            }

            function getRandomQuests(type, count) {
                const templates = QUEST_TEMPLATES[type];
                if (!templates || !Array.isArray(templates)) {
                    console.warn(`No templates found for type: ${type}`);
                    return [];
                }
                
                const actualCount = Math.min(count, templates.length);
                const shuffled = [...templates].sort(() => 0.5 - Math.random());
                return shuffled.slice(0, actualCount).map(q => ({ 
                    ...q, 
                    progress: 0, 
                    completed: false, 
                    claimed: false,
                    isNew: true 
                }));
            }

            function loadRpgData() {
                try {
                    const saved = localStorage.getItem(RPG_STORAGE_KEY);
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        
                        // Ensure all quest arrays exist
                        if (!parsed.dailyQuests || !Array.isArray(parsed.dailyQuests) || parsed.dailyQuests.length === 0) {
                            parsed.dailyQuests = getRandomQuests('daily', 4);
                        }
                        if (!parsed.weeklyQuests || !Array.isArray(parsed.weeklyQuests) || parsed.weeklyQuests.length === 0) {
                            parsed.weeklyQuests = getRandomQuests('weekly', 3);
                        }
                        if (!parsed.legendaryQuests || !Array.isArray(parsed.legendaryQuests) || parsed.legendaryQuests.length === 0) {
                            parsed.legendaryQuests = getRandomQuests('legendary', 5);
                        }
                        
                        console.log("Loaded RPG data:", parsed);
                        console.log("Legendary quests after fix:", parsed.legendaryQuests);
                        return parsed;
                    }
                } catch (e) {
                    console.warn("Failed to load RPG data:", e);
                }
                
                // Create new default data
                const defaultData = {
                    level: 1, xp: 0, xpToNextLevel: 100, totalXP: 0,
                    strength: 5, intelligence: 5, wisdom: 5, luck: 5,
                    health: 100, maxHealth: 100, mana: 50, maxMana: 100,
                    questsCompleted: 0, perfectDays: 0, achievements: [],
                    titles: ['Novice Adventurer'], currentTitle: 'Novice Adventurer',
                    dailyQuests: getRandomQuests('daily', 4),
                    weeklyQuests: getRandomQuests('weekly', 3),
                    legendaryQuests: getRandomQuests('legendary', 5),
                    completedQuestIds: [],
                    dailyStreak: 0, lastDailyComplete: null,
                    lastDailyReset: new Date().toDateString(),
                    lastWeeklyReset: getWeekStart()
                };
                
                console.log("Created default data with legendary quests:", defaultData.legendaryQuests);
                return defaultData;
            }

            function saveRpgData(data) {
                try {
                    localStorage.setItem(RPG_STORAGE_KEY, JSON.stringify(data));
                } catch (e) {
                    console.warn("Failed to save RPG data:", e);
                }
            }

            function getWeekStart() {
                const d = new Date();
                d.setDate(d.getDate() - d.getDay() + (d.getDay() === 0 ? -6 : 1));
                return d.toDateString();
            }

            function getTodayKey() {
                return new Date().toDateString();
            }

            function collectProgress() {
                const mainData = loadStudyData();
                const studyData = mainData.studyData || {};
                const tasks = mainData.tasks || [];
                
                const today = getTodayKey();
                const todayStats = Array.isArray(studyData.dailyStats) ? studyData.dailyStats.find(s => s?.date === today) : null;
                
                const focusSessions = Array.isArray(studyData.studySessions) ? studyData.studySessions.filter(s => {
                    if (!s?.date) return false;
                    try {
                        return new Date(s.date).toDateString() === today && (s.hours || 0) >= 0.4;
                    } catch {
                        return false;
                    }
                }).length || 0 : 0;
                
                const todayTasks = Array.isArray(tasks) ? tasks.filter(t => {
                    if (!t?.completed || !t?.completedAt) return false;
                    try {
                        return new Date(t.completedAt).toDateString() === today;
                    } catch {
                        return false;
                    }
                }).length || 0 : 0;
                
                const weekAgo = new Date();
                weekAgo.setDate(weekAgo.getDate() - 7);
                
                const weeklyTasks = Array.isArray(tasks) ? tasks.filter(t => {
                    if (!t?.completed || !t?.completedAt) return false;
                    try {
                        return new Date(t.completedAt) >= weekAgo;
                    } catch {
                        return false;
                    }
                }).length || 0 : 0;
                
                const weeklyHours = Array.isArray(studyData.dailyStats) ? studyData.dailyStats.reduce((sum, day) => {
                    if (!day?.date) return sum;
                    try {
                        if (new Date(day.date) >= weekAgo) {
                            return sum + (day.hours || 0);
                        }
                    } catch {}
                    return sum;
                }, 0) || 0 : 0;
                
                const completedTasks = Array.isArray(tasks) ? tasks.filter(t => t?.completed).length || 0 : 0;
                const totalHours = parseFloat(studyData.totalStudyHours || 0);
                const streak = studyData.streak || 0;
                
                const rpgData = loadRpgData();
                const questsCompleted = rpgData.questsCompleted || 0;
                
                const currentHour = new Date().getHours();
                const isEarlyBird = currentHour < 8;
                const isNightOwl = currentHour >= 22;
                
                return {
                    focusSessions, todayTasks,
                    streakMaintained: studyData.lastStudyDate === today ? 1 : 0,
                    todayHours: todayStats?.hours || 0,
                    streak, weeklyTasks, weeklyHours,
                    completedTasks, totalHours, questsCompleted,
                    isEarlyBird, isNightOwl,
                    allDailyCompleted: checkAllDailyCompleted()
                };
            }

            function checkAllDailyCompleted() {
                try {
                    const data = loadRpgData();
                    if (!data || !data.dailyQuests || !Array.isArray(data.dailyQuests)) return false;
                    return data.dailyQuests.every(q => q && q.completed);
                } catch (e) {
                    return false;
                }
            }

            function updateQuests() {
                try {
                    const data = loadRpgData();
                    const progress = collectProgress();
                    
                    const today = getTodayKey();
                    if (data.lastDailyReset !== today) {
                        data.dailyQuests = getRandomQuests('daily', 4);
                        data.lastDailyReset = today;
                    }
                    
                    const weekStart = getWeekStart();
                    if (data.lastWeeklyReset !== weekStart) {
                        data.weeklyQuests = getRandomQuests('weekly', 3);
                        data.lastWeeklyReset = weekStart;
                    }
                    
                    let questCompleted = false;
                    let completedQuestId = null;
                    let completedCategory = null;
                    let completedCount = 0;
                    
                    if (Array.isArray(data.dailyQuests)) {
                        data.dailyQuests.forEach(quest => {
                            if (!quest || !quest.id) return;
                            if (!quest.completed && !quest.claimed) {
                                if (quest.id === 'daily_focus') quest.progress = progress.focusSessions;
                                else if (quest.id === 'daily_tasks') quest.progress = progress.todayTasks;
                                else if (quest.id === 'daily_streak') quest.progress = progress.streakMaintained;
                                else if (quest.id === 'daily_hours') quest.progress = Math.floor(progress.todayHours);
                                else if (quest.id === 'daily_early') quest.progress = progress.isEarlyBird ? 1 : 0;
                                else if (quest.id === 'daily_night') quest.progress = progress.isNightOwl ? 1 : 0;
                                else if (quest.id === 'daily_perfect') quest.progress = progress.allDailyCompleted ? 1 : 0;
                                
                                if (quest.progress >= quest.requirement && !quest.completed) {
                                    quest.completed = true;
                                    questCompleted = true;
                                    completedQuestId = quest.id;
                                    completedCategory = 'daily';
                                    completedCount++;
                                }
                            }
                        });
                    }
                    
                    if (Array.isArray(data.weeklyQuests)) {
                        data.weeklyQuests.forEach(quest => {
                            if (!quest || !quest.id) return;
                            if (!quest.completed && !quest.claimed) {
                                if (quest.id === 'weekly_streak') quest.progress = progress.streak;
                                else if (quest.id === 'weekly_tasks') quest.progress = progress.weeklyTasks;
                                else if (quest.id === 'weekly_hours') quest.progress = Math.floor(progress.weeklyHours);
                                else if (quest.id === 'weekly_focus') quest.progress = Math.floor(progress.weeklyHours / 2);
                                else if (quest.id === 'weekly_perfect') quest.progress = progress.streak >= 7 ? 1 : 0;
                                
                                if (quest.progress >= quest.requirement && !quest.completed) {
                                    quest.completed = true;
                                    questCompleted = true;
                                    completedQuestId = quest.id;
                                    completedCategory = 'weekly';
                                    completedCount++;
                                }
                            }
                        });
                    }
                    
                    if (Array.isArray(data.legendaryQuests)) {
                        data.legendaryQuests.forEach(quest => {
                            if (!quest || !quest.id) return;
                            if (!quest.completed && !quest.claimed) {
                                if (quest.id === 'legend_first') quest.progress = progress.questsCompleted >= 1 ? 1 : 0;
                                else if (quest.id === 'legend_10') quest.progress = progress.questsCompleted >= 10 ? 1 : 0;
                                else if (quest.id === 'legend_50') quest.progress = progress.questsCompleted >= 50 ? 1 : 0;
                                else if (quest.id === 'legend_100') quest.progress = progress.questsCompleted >= 100 ? 1 : 0;
                                else if (quest.id === 'legend_streak_30') quest.progress = progress.streak >= 30 ? 1 : 0;
                                else if (quest.id === 'legend_tasks_500') quest.progress = progress.completedTasks >= 500 ? 1 : 0;
                                else if (quest.id === 'legend_hours_100') quest.progress = Math.floor(progress.totalHours) >= 100 ? 1 : 0;
                                
                                if (quest.progress >= quest.requirement && !quest.completed) {
                                    quest.completed = true;
                                    questCompleted = true;
                                    completedQuestId = quest.id;
                                    completedCategory = 'legendary';
                                    completedCount++;
                                }
                            }
                        });
                    }
                    
                    data.strength = 5 + Math.floor(progress.completedTasks / 10);
                    data.intelligence = 5 + Math.floor(progress.totalHours / 5);
                    data.wisdom = 5 + Math.floor(progress.streak / 3);
                    data.mana = Math.min(data.maxMana, 50 + (progress.focusSessions * 10));
                    data.health = Math.min(data.maxHealth, 70 + (progress.streak * 2));
                    
                    saveRpgData(data);
                    
                    if (completedCount > 0) {
                        const pet = updatePet(completedCount);
                        const boss = updateBoss(completedCount);
                        
                        const petMessage = getPetMessage(pet);
                        if (petMessage) {
                            setTimeout(() => {
                                showNotification(`🐾 ${pet.name}: ${petMessage}`, 'info');
                            }, 1000);
                        }
                    }
                    
                    if (questCompleted && completedQuestId && completedCategory) {
                        setTimeout(() => {
                            showNotification("✨ Quest completed! A new challenge appears!", "success");
                        }, 500);
                    }
                    
                    return { data, questCompleted, completedQuestId, completedCategory };
                } catch (e) {
                    console.warn("Error updating quests:", e);
                    return { data: loadRpgData(), questCompleted: false };
                }
            }

            function replaceCompletedQuest(category, completedId) {
                try {
                    const data = loadRpgData();
                    
                    if (!data.completedQuestIds) data.completedQuestIds = [];
                    data.completedQuestIds.push(completedId);
                    
                    if (data.completedQuestIds.length > 20) {
                        data.completedQuestIds = data.completedQuestIds.slice(-20);
                    }
                    
                    const templates = QUEST_TEMPLATES[category];
                    const availableTemplates = templates.filter(q => !data.completedQuestIds.includes(q.id));
                    const replacement = availableTemplates.length > 0 
                        ? availableTemplates[Math.floor(Math.random() * availableTemplates.length)]
                        : templates[Math.floor(Math.random() * templates.length)];
                    
                    if (category === 'daily' && Array.isArray(data.dailyQuests)) {
                        const index = data.dailyQuests.findIndex(q => q && q.id === completedId);
                        if (index !== -1) {
                            data.dailyQuests[index] = {
                                ...replacement,
                                progress: 0,
                                completed: false,
                                claimed: false,
                                isNew: true
                            };
                        }
                    } else if (category === 'weekly' && Array.isArray(data.weeklyQuests)) {
                        const index = data.weeklyQuests.findIndex(q => q && q.id === completedId);
                        if (index !== -1) {
                            data.weeklyQuests[index] = {
                                ...replacement,
                                progress: 0,
                                completed: false,
                                claimed: false,
                                isNew: true
                            };
                        }
                    } else if (category === 'legendary' && Array.isArray(data.legendaryQuests)) {
                        const index = data.legendaryQuests.findIndex(q => q && q.id === completedId);
                        if (index !== -1) {
                            data.legendaryQuests[index] = {
                                ...replacement,
                                progress: 0,
                                completed: false,
                                claimed: false,
                                isNew: true
                            };
                        }
                    }
                    
                    saveRpgData(data);
                    showNotification(`🔄 New ${category} quest: ${replacement.name}!`, "info");
                    
                    return data;
                } catch (e) {
                    console.warn("Error replacing quest:", e);
                    return loadRpgData();
                }
            }

            // ===== MAIN XP FUNCTION - FIXED LEVELING =====
            window.addXP = function(amount) {
                try {
                    const xpMultiplier = getEventMultiplier('xp');
                    const finalAmount = Math.floor(amount * xpMultiplier);
                    
                    const data = loadRpgData();
                    const oldLevel = data.level || 1;
                    
                    data.xp = (data.xp || 0) + finalAmount;
                    data.totalXP = (data.totalXP || 0) + finalAmount;
                    
                    let leveledUp = false;
                    let levelsGained = 0;
                    
                    // Keep leveling up while XP exceeds threshold
                    while (data.xp >= (data.xpToNextLevel || 100)) {
                        data.xp -= (data.xpToNextLevel || 100);
                        data.level = (data.level || 1) + 1;
                        data.xpToNextLevel = Math.floor((data.xpToNextLevel || 100) * 1.3);
                        
                        data.strength = (data.strength || 5) + 1;
                        data.intelligence = (data.intelligence || 5) + 1;
                        data.wisdom = (data.wisdom || 5) + 1;
                        data.luck = (data.luck || 5) + 1;
                        
                        levelsGained++;
                        leveledUp = true;
                        
                        console.log(`Level up! New level: ${data.level}, XP to next: ${data.xpToNextLevel}`);
                    }
                    
                    if (leveledUp) {
                        if (levelsGained === 1) {
                            showAchievement('LEVEL UP!', `You reached level ${data.level}!`, '⭐');
                        } else {
                            showAchievement('MASSIVE LEVEL UP!', `You gained ${levelsGained} levels! Now level ${data.level}!`, '🌟');
                        }
                        
                        const newTitle = GAME_TITLES.find(t => t.level <= data.level);
                        if (newTitle && (!data.titles || !data.titles.includes(newTitle.title))) {
                            if (!data.titles) data.titles = [];
                            data.titles.push(newTitle.title);
                            data.currentTitle = newTitle.title;
                        }
                    }
                    
                    if (xpMultiplier > 1) {
                        showNotification(`✨ Event bonus: ${xpMultiplier}x XP! (+${finalAmount} XP)`, 'success');
                    } else {
                        showNotification(`✨ +${finalAmount} XP`, 'success');
                    }
                    
                    saveRpgData(data);
                    render();
                    
                    console.log(`Added ${finalAmount} XP. Current level: ${data.level}, XP: ${data.xp}/${data.xpToNextLevel}`);
                    
                    return data;
                } catch (e) {
                    console.warn("Error adding XP:", e);
                }
            };

            function claimQuest(questId, category) {
                try {
                    const data = loadRpgData();
                    let quests = [];
                    
                    if (category === 'daily') quests = data.dailyQuests || [];
                    else if (category === 'weekly') quests = data.weeklyQuests || [];
                    else if (category === 'legendary') quests = data.legendaryQuests || [];
                    
                    const questIndex = quests.findIndex(q => q && q.id === questId);
                    const quest = quests[questIndex];
                    
                    if (!quest || !quest.completed || quest.claimed) {
                        showNotification("Cannot claim - already completed", "error");
                        return;
                    }
                    
                    quest.claimed = true;
                    data.questsCompleted = (data.questsCompleted || 0) + 1;
                    
                    if (quest.stats) {
                        Object.entries(quest.stats).forEach(([stat, value]) => {
                            if (stat === 'all') {
                                data.strength = (data.strength || 5) + value;
                                data.intelligence = (data.intelligence || 5) + value;
                                data.wisdom = (data.wisdom || 5) + value;
                                data.luck = (data.luck || 5) + value;
                            } else {
                                data[stat] = (data[stat] || 5) + value;
                            }
                        });
                    }
                    
                    saveRpgData(data);
                    
                    const xpMultiplier = getEventMultiplier('xp');
                    const finalXP = Math.floor(quest.xp * xpMultiplier);
                    
                    window.addXP(finalXP);
                    
                    const questElement = document.querySelector(`[data-quest-id="${questId}"]`);
                    if (questElement) {
                        questElement.classList.add('completed');
                    }
                    
                    showNotification(`✨ Quest Complete! +${finalXP} XP`, "success");
                    
                    setTimeout(() => {
                        replaceCompletedQuest(category, questId);
                        render();
                    }, 500);
                } catch (e) {
                    console.warn("Error claiming quest:", e);
                }
            }

            function rollDice() {
                try {
                    const data = loadRpgData();
                    
                    if ((data.mana || 0) < 5) {
                        showNotification("Not enough mana! Need 5 mana.", "error");
                        return;
                    }
                    
                    data.mana = (data.mana || 50) - 5;
                    
                    const roll1 = Math.floor(Math.random() * 6) + 1;
                    const roll2 = Math.floor(Math.random() * 6) + 1;
                    const total = roll1 + roll2;
                    
                    let xpGain = 10;
                    let message = '🎲 +10 XP';
                    
                    if (total === 12) {
                        xpGain = 100;
                        message = '🌟 PERFECT ROLL! +100 XP!';
                        showAchievement('PERFECT ROLL!', 'You rolled a 12!', '🎲');
                    } else if (total >= 10) {
                        xpGain = 50;
                        message = '✨ Great roll! +50 XP!';
                    } else if (total >= 7) {
                        xpGain = 25;
                        message = '👍 Good roll! +25 XP!';
                    }
                    
                    saveRpgData(data);
                    window.addXP(xpGain);
                    showNotification(message, "success");
                    render();
                } catch (e) {
                    console.warn("Error rolling dice:", e);
                }
            }

            function gmClick() {
                try {
                    const bubble = document.getElementById('gmBubble');
                    const data = loadRpgData();
                    const progress = collectProgress();
                    const events = checkEvents();
                    const pet = loadPetData();
                    const boss = loadBossData();
                    
                    const messages = Object.values(GM_MESSAGES);
                    let message = messages[Math.floor(Math.random() * messages.length)];
                    
                    if (events.active.length > 0) {
                        const event = events.active[0];
                        message = `🎉 Special event: ${event.name}! ${event.description}`;
                    }
                    
                    message = message
                        .replace('{{xp}}', data.xp || 0)
                        .replace('{{xpNeeded}}', (data.xpToNextLevel || 100) - (data.xp || 0))
                        .replace('{{nextLevel}}', (data.level || 1) + 1)
                        .replace('{{health}}', Math.round(data.health || 100))
                        .replace('{{maxHealth}}', data.maxHealth || 100)
                        .replace('{{mana}}', Math.round(data.mana || 50))
                        .replace('{{maxMana}}', data.maxMana || 100)
                        .replace('{{str}}', data.strength || 5)
                        .replace('{{int}}', data.intelligence || 5)
                        .replace('{{wis}}', data.wisdom || 5)
                        .replace('{{luk}}', data.luck || 5)
                        .replace('{{tasks}}', progress.completedTasks || 0)
                        .replace('{{hours}}', Math.round(progress.totalHours || 0))
                        .replace('{{streak}}', progress.streak || 0)
                        .replace('{{dailyDone}}', (data.dailyQuests || []).filter(q => q && q.completed).length)
                        .replace('{{dailyTotal}}', (data.dailyQuests || []).length)
                        .replace('{{dailyLeft}}', (data.dailyQuests || []).length - (data.dailyQuests || []).filter(q => q && q.completed).length)
                        .replace('{{weeklyDone}}', (data.weeklyQuests || []).filter(q => q && q.completed).length)
                        .replace('{{weeklyTotal}}', (data.weeklyQuests || []).length)
                        .replace('{{weeklyLeft}}', (data.weeklyQuests || []).length - (data.weeklyQuests || []).filter(q => q && q.completed).length)
                        .replace('{{legendaryDone}}', (data.legendaryQuests || []).filter(q => q && q.completed).length)
                        .replace('{{legendaryTotal}}', (data.legendaryQuests || []).length)
                        .replace('{{legendaryLeft}}', (data.legendaryQuests || []).length - (data.legendaryQuests || []).filter(q => q && q.completed).length)
                        .replace('{{level}}', data.level || 1)
                        .replace('{{xpToNext}}', data.xpToNextLevel || 100);
                    
                    bubble.textContent = '🧙‍♂️ ' + message;
                    
                    bubble.style.animation = 'none';
                    bubble.offsetHeight;
                    bubble.style.animation = 'bubbleAppear 0.3s ease-out';
                } catch (e) {
                    console.warn("Error in GM click:", e);
                }
            }

            function renderQuests(quests, category) {
                if (!quests || !Array.isArray(quests) || quests.length === 0) {
                    return '<div class="empty-state">No quests available</div>';
                }
                
                return quests.map(quest => {
                    if (!quest) return '';
                    
                    const progressPercent = ((quest.progress || 0) / (quest.requirement || 1)) * 100;
                    const canClaim = quest.completed && !quest.claimed;
                    
                    let statRewards = '';
                    if (quest.stats) {
                        statRewards = Object.entries(quest.stats).map(([stat, value]) => {
                            const icons = { strength: '💪', intelligence: '🧠', wisdom: '📚', luck: '🍀', all: '📊' };
                            return `<span class="reward-chip">${icons[stat] || '✨'} +${value}</span>`;
                        }).join('');
                    }
                    
                    const newQuestBadge = quest.isNew ? '<div class="new-quest-badge">NEW!</div>' : '';
                    
                    return `
                        <div class="quest-card ${quest.rarity || 'common'}" data-quest-id="${quest.id}">

                                <div class="quest-info">

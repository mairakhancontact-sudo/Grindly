                                        <span class="quest-xp">✨ ${quest.xp || 0} XP</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="quest-description">${quest.description || ''}</div>
                            
                            <div class="quest-rewards">
                                ${statRewards}
                            </div>
                            
                            <div class="quest-progress">
                                <div class="progress-track">
                                    <div class="progress-fill" style="width: ${progressPercent}%;"></div>
                                </div>
                                <div class="progress-text">
                                    <span>Progress: ${quest.progress || 0}/${quest.requirement || 1}</span>
                                    <span>${Math.round(progressPercent)}%</span>
                                </div>
                            </div>
                            
                            <div class="quest-actions">
                                ${canClaim ? 
                                    `<button class="quest-btn claim" onclick="claimQuest('${quest.id}', '${category}')">
                                        ✨ CLAIM REWARDS

                                    quest.claimed ?
                                    `<button class="quest-btn" disabled>✓ COMPLETED</button>` :
                                    `<button class="quest-btn" disabled>IN PROGRESS</button>`
                                }
                            </div>
                        </div>
                    `;
                }).join('');
            }

                            </div>
                            
                            <div class="stat-card">
                                <div class="stat-icon">🧠</div>
                                <div>
                                    <div class="stat-label">Intelligence</div>
                                    <div class="stat-value">${data.intelligence || 5}</div>
                                    <div class="stat-bonus">${Math.round(progress.totalHours || 0)} hrs</div>
                                </div>
                            </div>
                            
                            <div class="stat-card">
                                <div class="stat-icon">📚</div>
                                <div>
                                    <div class="stat-label">Wisdom</div>
                                    <div class="stat-value">${data.wisdom || 5}</div>
                                    <div class="stat-bonus">${progress.streak || 0} day streak</div>
                                </div>
                            </div>
                            
                            <div class="stat-card">
                                <div class="stat-icon">🍀</div>
                                <div>
                                    <div class="stat-label">Luck</div>
                                    <div class="stat-value">${data.luck || 5}</div>
                                    <div class="stat-bonus">${data.perfectDays || 0} perfect days</div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="quick-actions">
                            <button class="action-btn" onclick="rollDice()" ${(data.mana || 0) < 5 ? 'disabled' : ''}>
                                🎲 Roll Dice (5 Mana)
                            </button>
                            <button class="action-btn" onclick="gmClick()">
                                🧙 Ask Game Master
                            </button>
                            
                        </div>
                        
                        <div class="pet-section">
                            <div class="pet-container">
                                <div class="pet-avatar" onclick="petInteract()" title="Click to interact!">${pet.type || '🐶'}</div>
                                <div class="pet-info">
                                    <div class="pet-name">${pet.name || 'Buddy'} (Lv.${pet.level || 1})</div>
                                    <div class="pet-level-bar">
                                        <div class="pet-level-fill" style="width: ${petLevelPercent}%;"></div>
                                    </div>
                                    <div class="pet-messages">
                                        ${petMessage || "Click on your pet!"}
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="boss-section">
                            <div class="boss-header">
                                <div class="boss-icon">${boss.defeated ? '👑' : '👾'}</div>
                                <div>
                                    <div class="boss-title">${boss.defeated ? 'BOSS DEFEATED!' : `BOSS LEVEL ${boss.level || 1}`}</div>
                                    <div style="color: var(--text-muted);">Defeat the boss for massive rewards!</div>
                                </div>
                            </div>
                            
                            <div class="boss-health-bar">
                                <div class="boss-health-fill" style="width: ${bossHealthPercent}%;"></div>
                            </div>
                            
                            <div class="boss-stats">
                                <div class="boss-stat">
                                    <div style="font-size: 1.2rem; font-weight: 700; color: var(--boss-red);">${boss.defeated ? '0' : (boss.health || 1000)}</div>
                                    <div style="font-size: 0.8rem;">Health Remaining</div>
                                </div>
                                <div class="boss-stat">
                                    <div style="font-size: 1.2rem; font-weight: 700; color: var(--boss-red);">${(boss.rewards || [500])[boss.currentReward || 0]}</div>
                                    <div style="font-size: 0.8rem;">Reward XP</div>
                                </div>
                                <div class="boss-stat">
                                    <div style="font-size: 1.2rem; font-weight: 700; color: var(--boss-red);">${boss.level || 1}</div>
                                    <div style="font-size: 0.8rem;">Boss Level</div>
                                </div>
                            </div>
                        </div>
                        
                        ${(events.active || []).length > 0 ? `
                        <div class="events-section">
                            <div class="category-header">
                                <div class="category-icon">🎉</div>
                                <div class="category-title">ACTIVE EVENTS</div>
                                <div class="category-badge">LIVE NOW</div>
                            </div>
                            <div class="events-grid">
                                ${(events.active || []).map(event => {
                                    const timeLeft = Math.max(0, Math.floor(((event.endTime || 0) - Date.now()) / 1000 / 60));
                                    const hours = Math.floor(timeLeft / 60);
                                    const minutes = timeLeft % 60;
                                    return `
                                        <div class="event-card active">
                                            <div class="event-timer">${hours}h ${minutes}m left</div>
                                            <div class="event-icon">${event.icon || '🎉'}</div>
                                            <div class="event-name">${event.name || 'Event'}</div>
                                            <div class="event-desc">${event.description || ''}</div>
                                            <div class="event-reward">${event.reward || ''}</div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                        ` : ''}
                        
                        ${(events.upcoming || []).length > 0 ? `
                        <div class="events-section">
                            <div class="category-header">
                                <div class="category-icon">📅</div>
                                <div class="category-title">UPCOMING EVENTS</div>
                            </div>
                            <div class="events-grid">
                                ${(events.upcoming || []).slice(0, 2).map(event => {
                                    const timeToStart = Math.max(0, Math.floor(((event.startTime || 0) - Date.now()) / 1000 / 60 / 60));
                                    return `
                                        <div class="event-card">
                                            <div class="event-icon">${event.icon || '📅'}</div>
                                            <div class="event-name">${event.name || 'Event'}</div>
                                            <div class="event-desc">Starts in ${timeToStart}h</div>
                                            <div class="event-reward">${event.reward || ''}</div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                        ` : ''}
                        
                        <div class="quest-category">
                            <div class="category-header">
                                <div class="category-icon">📅</div>
                                <div class="category-title">Daily Quests</div>
                                <div class="category-badge">🔥 ${data.dailyStreak || 0} Day Streak</div>
                            </div>
                            ${renderQuests(data.dailyQuests || [], 'daily')}
                        </div>
                        
                        <div class="quest-category">
                            <div class="category-header">
                                <div class="category-icon">📆</div>
                                <div class="category-title">Weekly Quests</div>
                                <div class="category-badge">⚔️ Epic Rewards</div>
                            </div>
                            ${renderQuests(data.weeklyQuests || [], 'weekly')}
                        </div>
                        
                        <div class="quest-category">
                            <div class="category-header">
                                <div class="category-icon">🌟</div>
                                <div class="category-title">Legendary Quests</div>
                                <div class="category-badge">
                                    ${(data.legendaryQuests && Array.isArray(data.legendaryQuests) 
                                        ? data.legendaryQuests.filter(q => q && q.completed).length 
                                        : 0)}/
                                    ${(data.legendaryQuests && Array.isArray(data.legendaryQuests) 
                                        ? data.legendaryQuests.length 
                                        : 0)}
                                </div>
                            </div>
                            ${renderQuests(data.legendaryQuests || [], 'legendary')}
                        </div>
                    `;
                } catch (error) {
                    console.error("Render error:", error);
                    const content = document.getElementById('questContent');
                    if (content) {
                        content.innerHTML = `<div class="empty-state">Error loading quest data. Please refresh.</div>`;
                    }
                }
            }

            function showNotification(message, type = 'info') {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.innerHTML = message;
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.remove();
                }, 3000);
            }

            window.petInteract = function() {
                const pet = loadPetData();
                const randomMessage = (pet.messages || [])[Math.floor(Math.random() * (pet.messages || []).length)] || "Hello!";
                showNotification(`🐾 ${pet.name || 'Buddy'}: ${randomMessage}`, 'info');
            };

            window.claimQuest = claimQuest;
            window.rollDice = rollDice;
            window.gmClick = gmClick;
            window.goBack = function() {
                window.location.href = 'studentmode.html';
            };

            setTimeout(() => {
                try {
                    render();
                } catch (e) {
                    console.error("Initial render failed:", e);
                }
            }, 100);

            setInterval(() => {
                try {
                    render();
                } catch (e) {
                    console.error("Auto-refresh failed:", e);
                }
            }, 30000);
            
            setTimeout(() => {
                try {
                    gmClick();
                } catch (e) {
                    console.error("GM message failed:", e);
                }
            }, 2000);
            
            setInterval(() => {
                try {
                    checkEvents();
                    render();
                } catch (e) {
                    console.error("Event check failed:", e);
                }
            }, 60000);

            document.addEventListener('touchstart', function() {
                if (document.getElementById('questContent')?.innerHTML.includes('Loading')) {
                    setTimeout(render, 500);
                }
            }, { once: true });
        })();
    </script>
</body>
</html>
